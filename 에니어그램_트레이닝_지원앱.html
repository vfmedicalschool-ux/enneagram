<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에니어그램의 지혜 — 트레이닝 지원 앱</title>
<style>
  :root {
    --navy: #1B3A5C;
    --navy-light: #2A5080;
    --teal: #2A7B7B;
    --gold: #C89B3C;
    --gold-light: #E0B84E;
    --bg: #F0F5F9;
    --card: #FFFFFF;
    --text: #1a2a3a;
    --muted: #5a7a9a;
    --border: #D0DDE8;
    --sidebar-w: 290px;
    --explain-bg: #EEF4FF;
    --explain-border: #3A6EA8;
    --example-bg: #FFF8EE;
    --example-border: #C89B3C;
    --question-bg: #F0FFF4;
    --question-border: #2A7B7B;
    --concept-bg: #FFF0F0;
    --concept-border: #C05050;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic','맑은 고딕',Apple SD Gothic Neo,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

  /* SIDEBAR */
  #sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--navy); color:#fff; display:flex; flex-direction:column; overflow:hidden; box-shadow:2px 0 12px rgba(0,0,0,.25); }
  #sidebar-header { padding:18px 16px 14px; border-bottom:1px solid rgba(255,255,255,.12); }
  .app-title { font-size:14px; font-weight:700; line-height:1.4; }
  .app-sub { font-size:11px; color:rgba(255,255,255,.5); margin-top:4px; }

  #search-box { margin:10px 12px; position:relative; }
  #search-box input { width:100%; padding:7px 10px 7px 30px; border:none; border-radius:6px; background:rgba(255,255,255,.12); color:#fff; font-size:13px; outline:none; }
  #search-box input::placeholder { color:rgba(255,255,255,.35); }
  #search-box .icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:13px; color:rgba(255,255,255,.4); }

  #nav { flex:1; overflow-y:auto; padding:4px 0 12px; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.15) transparent; }
  .chapter-group { margin-bottom:2px; }
  .chap-hdr { padding:8px 14px 5px; font-size:10px; font-weight:700; letter-spacing:.07em; color:var(--gold-light); text-transform:uppercase; cursor:pointer; display:flex; align-items:center; gap:6px; user-select:none; }
  .chap-hdr:hover { color:#fff; }
  .chap-chevron { font-size:9px; transition:transform .2s; display:inline-block; }
  .chap-hdr.collapsed .chap-chevron { transform:rotate(-90deg); }
  .chap-sessions { display:flex; flex-direction:column; gap:1px; }
  .chap-sessions.hidden { display:none; }

  .sess-btn { display:flex; align-items:center; gap:9px; padding:7px 12px 7px 18px; cursor:pointer; border-left:3px solid transparent; transition:background .15s,border-color .15s; }
  .sess-btn:hover { background:rgba(255,255,255,.07); border-left-color:rgba(255,255,255,.25); }
  .sess-btn.active { background:rgba(255,255,255,.14); border-left-color:var(--gold); }
  .sess-btn .num { width:22px; height:22px; background:rgba(255,255,255,.14); border-radius:50%; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sess-btn.active .num { background:var(--gold); }
  .sess-btn.done .num { background:var(--teal); }
  .sess-btn .lbl { font-size:12px; color:rgba(255,255,255,.72); line-height:1.3; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sess-btn.active .lbl { color:#fff; font-weight:600; }
  .sess-btn .dt { font-size:10px; color:rgba(255,255,255,.35); flex-shrink:0; }

  #prog-wrap { padding:10px 14px; border-top:1px solid rgba(255,255,255,.1); }
  #prog-wrap .prog-lbl { font-size:11px; color:rgba(255,255,255,.45); margin-bottom:5px; }
  .prog-bar { height:4px; background:rgba(255,255,255,.12); border-radius:2px; }
  .prog-fill { height:100%; background:var(--gold); border-radius:2px; transition:width .4s; }

  /* MAIN */
  #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  #topbar { background:#fff; border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:14px; flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .tb-chapter { font-size:11px; color:var(--teal); font-weight:600; margin-bottom:3px; }
  .tb-name { font-size:17px; font-weight:700; color:var(--navy); }
  .tb-date { font-size:11px; color:var(--muted); margin-top:2px; }
  #done-btn { display:flex; align-items:center; gap:6px; padding:7px 14px; border:2px solid var(--teal); border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; color:var(--teal); background:#fff; transition:all .2s; white-space:nowrap; flex-shrink:0; }
  #done-btn:hover { background:var(--teal); color:#fff; }
  #done-btn.marked { background:var(--teal); color:#fff; }

  #tabs { display:flex; background:#fff; border-bottom:2px solid var(--border); padding:0 20px; flex-shrink:0; gap:2px; }
  .tab-btn { padding:11px 16px 9px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s; display:flex; align-items:center; gap:6px; white-space:nowrap; user-select:none; }
  .tab-btn:hover { color:var(--navy); }
  .tab-btn.active { color:var(--navy); border-bottom-color:var(--navy); }
  .badge { background:var(--border); border-radius:10px; font-size:10px; padding:1px 6px; font-weight:700; color:var(--muted); }
  .tab-btn.active .badge { background:var(--navy); color:#fff; }

  #content { flex:1; overflow-y:auto; padding:20px 24px; }

  .tab-panel { display:none; flex-direction:column; gap:14px; }
  .tab-panel.active { display:flex; }

  /* TOPICS */
  .topics-bar { background:#fff; border-radius:10px; padding:12px 16px; border:1px solid var(--border); display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
  .topics-lbl { font-size:11px; color:var(--muted); font-weight:700; margin-right:4px; flex-shrink:0; }
  .topic-chip { background:var(--explain-bg); border:1px solid var(--explain-border); color:var(--navy); border-radius:20px; padding:3px 11px; font-size:12px; font-weight:500; }

  /* EXPLAIN CARDS */
  .explain-card { background:var(--explain-bg); border-left:4px solid var(--explain-border); border-radius:0 10px 10px 0; padding:15px 18px; }
  .card-topic { font-size:11px; font-weight:700; color:var(--explain-border); letter-spacing:.05em; margin-bottom:7px; text-transform:uppercase; }
  .card-text { font-size:14.5px; line-height:1.78; color:var(--text); }

  /* EXAMPLE CARDS */
  .example-card { background:var(--example-bg); border-left:4px solid var(--example-border); border-radius:0 10px 10px 0; padding:15px 18px; display:flex; gap:13px; align-items:flex-start; }
  .ex-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
  .ctx-lbl { font-size:11px; font-weight:700; color:var(--gold); margin-bottom:6px; }
  .ex-text { font-size:14.5px; line-height:1.78; color:var(--text); }

  /* QUESTION CARDS */
  .q-tip { background:#fff; border-radius:10px; border:1px solid var(--border); padding:12px 16px; font-size:13px; color:var(--muted); line-height:1.6; }
  .question-card { background:var(--question-bg); border:1px solid var(--question-border); border-radius:10px; padding:15px 18px; }
  .q-header { display:flex; align-items:flex-start; gap:10px; }
  .q-num { width:27px; height:27px; background:var(--question-border); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; margin-top:1px; }
  .q-text { font-size:14.5px; font-weight:600; color:var(--text); line-height:1.55; }

  /* CONCEPT */
  .concepts-grid { display:flex; flex-wrap:wrap; gap:10px; }
  .concept-chip { background:var(--concept-bg); border:1px solid var(--concept-border); color:#8B2020; border-radius:8px; padding:8px 15px; font-size:13px; font-weight:600; line-height:1.4; }

  /* WELCOME */
  #welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 40px; color:var(--muted); height:100%; }
  #welcome .w-icon { font-size:60px; margin-bottom:18px; }
  #welcome h2 { font-size:21px; font-weight:700; color:var(--navy); margin-bottom:10px; }
  #welcome p { font-size:14px; line-height:1.7; max-width:360px; }
  .stats { display:flex; gap:18px; margin-top:26px; flex-wrap:wrap; justify-content:center; }
  .stat-box { background:#fff; border-radius:12px; padding:14px 22px; border:1px solid var(--border); text-align:center; }
  .stat-num { font-size:26px; font-weight:700; color:var(--navy); }
  .stat-lbl { font-size:11px; color:var(--muted); margin-top:3px; }

  /* SEARCH VIEW */
  #search-view { display:none; }
  .sr-card { background:#fff; border-radius:10px; border:1px solid var(--border); padding:15px 18px; margin-bottom:12px; }
  .sr-header { display:flex; align-items:center; gap:10px; margin-bottom:11px; cursor:pointer; }
  .sr-header:hover .sr-link { color:var(--teal); }
  .sr-snum { background:var(--navy); color:#fff; border-radius:50%; width:27px; height:27px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
  .sr-title { font-size:14px; font-weight:700; color:var(--navy); flex:1; }
  .sr-date { font-size:11px; color:var(--muted); }
  .sr-link { font-size:12px; color:var(--muted); font-weight:600; }
  .sr-hit { background:var(--bg); border-radius:7px; padding:9px 13px; margin-bottom:7px; border-left:3px solid var(--teal); }
  .sr-hit-type { font-size:10px; font-weight:700; color:var(--teal); margin-bottom:4px; }
  .sr-hit-text { font-size:13px; line-height:1.6; }

  .no-results { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <div class="app-title">📚 에니어그램의 지혜<br>트레이닝 지원 앱</div>
    <div class="app-sub">신유나 약사 → 김나연 약사 트레이닝용</div>
  </div>
  <div id="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="search-input" placeholder="내용 검색..." oninput="handleSearch(this.value)">
  </div>
  <nav id="nav"></nav>
  <div id="prog-wrap">
    <div class="prog-lbl" id="prog-lbl">진행률: 0 / 23 세션</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</aside>

<div id="main">
  <div id="topbar" style="display:none;">
    <div style="flex:1;">
      <div class="tb-chapter" id="tb-chapter"></div>
      <div class="tb-name" id="tb-name"></div>
      <div class="tb-date" id="tb-date"></div>
    </div>
    <button id="done-btn" onclick="toggleDone()">✓ 학습 완료</button>
  </div>
  <div id="tabs" style="display:none;">
    <div class="tab-btn active" onclick="switchTab(0)">📖 선생님 설명 <span class="badge" id="b0">0</span></div>
    <div class="tab-btn" onclick="switchTab(1)">💡 예시·비유 <span class="badge" id="b1">0</span></div>
    <div class="tab-btn" onclick="switchTab(2)">❓ 트레이닝 질문 <span class="badge" id="b2">0</span></div>
    <div class="tab-btn" onclick="switchTab(3)">🏷️ 핵심 개념 <span class="badge" id="b3">0</span></div>
  </div>
  <div id="content">
    <div id="welcome">
      <div class="w-icon">📖</div>
      <h2>트레이닝 세션을 선택해주세요</h2>
      <p>왼쪽 목록에서 챕터와 세션을 선택하면<br>선생님(홍성찬)의 설명·예시·트레이닝 질문을<br>바로 확인할 수 있습니다.</p>
      <div class="stats">
        <div class="stat-box"><div class="stat-num">23</div><div class="stat-lbl">총 세션</div></div>
        <div class="stat-box"><div class="stat-num" id="s-exp">—</div><div class="stat-lbl">선생님 설명</div></div>
        <div class="stat-box"><div class="stat-num" id="s-ex">—</div><div class="stat-lbl">예시·비유</div></div>
        <div class="stat-box"><div class="stat-num" id="s-q">—</div><div class="stat-lbl">트레이닝 질문</div></div>
      </div>
    </div>
    <div id="session-view" style="display:none; flex-direction:column; gap:14px;">
      <div class="tab-panel active" id="p0"></div>
      <div class="tab-panel" id="p1"></div>
      <div class="tab-panel" id="p2"></div>
      <div class="tab-panel" id="p3"></div>
    </div>
    <div id="search-view"></div>
  </div>
</div>

<script>
const SESSIONS = [{"date": "2025-09-10", "session_num": 1, "filename": "", "book_chapter": "서문/제1장: 에니어그램이란 (pp.21-31)", "topics_covered": ["트레이닝 목적과 방향", "성격의 정의 (3자 시점)", "기본 유형 불변", "MBTI vs 에니어그램"], "teacher_explanations": [{"topic": "이 트레이닝 프로그램의 목적과 방향", "explanation": "우리가 하는 트레이닝은 단순히 에니어그램 번호를 아는 것을 넘어서, 실제로 삶을 변화시키는 것이 목적이야. 우리가 이 에니어그램을 배우는 이유는 결국 내가 왜 이렇게 행동하는지, 왜 이런 감정이 드는지를 알기 위해서야. 그걸 알게 되면 나를 객관적으로 볼 수 있고, 그러면 변화가 가능해지는 거야. 단순히 아는 것과 실제로 내 삶에 적용하는 것은 완전히 달라. 이론을 알아야 내가 지금 어떤 상태인지, 어디로 가야 하는지 정확하게 판단할 수 있거든. 그래서 선생님이 자꾸 이론을 강조하는 거야."}, {"topic": "인간은 영적 존재라는 관점", "explanation": "에니어그램의 근본적인 전제는 인간이 육체를 입고 물질세계에 태어난 영적 존재라는 거야. 이게 중요한 이유가 뭐냐면, 우리가 왜 이렇게 살아야 하는지, 이 삶의 목적이 뭔지에 대한 관점이 달라지거든. 영적 존재라는 관점에서 보면, 우리가 이 물질세계에서 겪는 모든 경험들이 다 의미가 있어. 고통도, 기쁨도, 관계도 다 배움의 과정이야. 그래서 에니어그램이 단순한 성격 분류가 아니라 영적 성장의 도구로 쓰이는 이유가 거기 있어. 우리가 어떤 번호냐를 알면 내가 어떤 방향으로 성장해야 하는지가 딱 나오거든."}, {"topic": "Ego와 Super Ego의 개념", "explanation": "에고(Ego)는 내가 나를 바라보는 이미지야. 내가 나를 어떻게 생각하는지. 수퍼에고(Super Ego)는 남들이 나를 어떻게 봐줬으면 하는 이미지야. 이 둘이 충돌할 때 갈등이 생기는 거야. 예를 들어서 나는 내가 되게 괜찮은 사람이라고 생각해. 그런데 남들은 나를 별로라고 봐. 그러면 갈등이 생기지. 에니어그램은 이 에고와 수퍼에고가 어떻게 형성되는지를 설명해 줘. 각 번호마다 이 에고와 수퍼에고가 다르게 나타나거든. 그래서 이걸 알면 내가 왜 이런 자아상을 갖게 됐는지, 왜 다른 사람한테 이런 모습으로 보이고 싶어 하는지를 이해할 수 있어."}, {"topic": "성격은 3자가 봤을 때의 모습", "explanation": "성격이 뭔지 알아? 성격이라는 게 내가 나를 바라보는 게 아니야. 성격은 3자가 봤을 때의 모습이야. 제3자가 나를 봤을 때 아 이 사람은 이런 사람이구나 이게 성격이거든. 그런데 우리는 내 성격을 내가 안다고 생각하는데 사실 잘 몰라. 왜냐면 나는 나를 주관적으로 볼 수밖에 없으니까. 그래서 에니어그램이 중요한 거야. 에니어그램은 내 성격을 객관적으로 바라볼 수 있는 틀을 줘. 내가 어떤 상황에서 어떤 행동을 하고, 어떤 감정을 느끼고, 어떻게 생각하는지 그 패턴을 알 수 있게 해줘. 그게 3자의 시선에서 나를 보는 거야."}, {"topic": "기본 유형은 변하지 않는다", "explanation": "에니어그램에서 가장 중요한 원칙 중 하나가 기본 유형은 절대 변하지 않는다는 거야. 내가 1번이면 평생 1번이야. 성장을 해도 1번이고, 분열이 와도 1번이야. 그러니까 내가 번호를 바꾸겠다는 생각은 잘못된 거야. 그게 아니라 1번으로서 어떻게 성장하느냐 이게 중요한 거거든. 그런데 많은 사람들이 착각하는 게 뭐냐면 나 성장했더니 다른 번호가 된 것 같아 이러는 거야. 아니야. 번호는 안 바뀌어. 다만 그 번호 안에서 건강한 상태냐 건강하지 않은 상태냐가 달라지는 거지. 그래서 내 번호를 정확하게 아는 게 중요한 거야."}, {"topic": "9가지 유형이 내 안에 다 있다", "explanation": "에니어그램 9가지 유형이 다 내 안에 있어. 이게 무슨 말이냐면, 나는 예를 들어서 7번이야. 근데 7번이라는 게 무조건 7번 특성만 갖고 있다는 게 아니야. 나는 기본적으로 7번이지만 나머지 8가지 유형의 특성도 다 조금씩 갖고 있어. 그래서 우리가 다른 번호를 이해할 수 있는 거야. 내 안에 그 번호가 있으니까. 단지 어떤 번호가 내 주성격이냐의 차이야. 그래서 에니어그램을 공부하면서 다른 사람을 이해하는 능력이 생기는 거야. 내 안에 그 사람의 특성이 있으니까 공감할 수 있는 거거든."}, {"topic": "MBTI와 에니어그램의 차이", "explanation": "MBTI랑 에니어그램은 완전히 달라. MBTI는 기본적으로 행동 패턴을 분류하는 거야. 어떤 상황에서 어떻게 행동하느냐를 보는 거지. 그런데 에니어그램은 행동의 동기를 봐. 왜 그런 행동을 하느냐. 그게 핵심이야. 같은 행동을 해도 동기가 다를 수 있거든. 그래서 에니어그램은 훨씬 더 깊이 들어가는 거야. MBTI로는 이 사람이 왜 이런 행동을 하는지 알 수 없어. 근데 에니어그램을 알면 알 수 있어. 그래서 에니어그램을 알면 사람을 훨씬 더 깊이 이해할 수 있는 거야. MBTI가 겉모습을 보는 거라면, 에니어그램은 내면을 보는 거야."}, {"topic": "자기인식의 중요성", "explanation": "에니어그램 공부의 출발점은 자기인식이야. 내가 나를 제대로 알아야 돼. 그런데 대부분의 사람들이 자기를 안다고 생각하는데 사실 잘 몰라. 왜냐면 자기를 객관적으로 볼 기회가 없었으니까. 에니어그램을 배우면서 내가 어떤 패턴으로 살아왔는지, 어떤 두려움을 갖고 있는지, 어떤 욕망을 갖고 있는지를 알게 돼. 그게 자기인식이야. 그런데 이게 쉽지 않아. 왜냐면 내 안에 있는 걸 보는 게 불편하거든. 내가 이런 사람이었구나 하는 게 불편할 수 있어. 근데 그 불편함을 견뎌야 성장이 되는 거야. 그래서 선생님이 항상 이 과정이 쉽지 않다고 하는 거야."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["나의 기본 에니어그램 번호가 무엇인지 알고 있나요? 그리고 그 번호를 알게 된 계기가 무엇인가요?", "내가 어떤 상황에서 가장 불편함을 느끼는지, 그 불편함이 어디서 오는 것 같은지 생각해 본 적 있나요?", "주변 사람 중에 나랑 잘 맞는 사람과 잘 안 맞는 사람이 있다면, 그 사람들의 에니어그램 번호를 추측해 보세요.", "내가 평소에 자주 하는 행동이나 생각의 패턴이 있다면 무엇인지 적어보세요."], "key_concepts": ["에니어그램의 목적", "기본 유형 불변의 원칙", "Ego와 Super Ego", "성격은 제3자의 시선", "9가지 유형의 내재", "성장 방향과 분열 방향", "MBTI와의 차이"]}, {"date": "2025-09-19", "session_num": 2, "filename": "", "book_chapter": "제1장 이어서 + 제2장 도입 (pp.36-51)", "topics_covered": ["9가지 큰 죄/열정", "7번 왜곡 구조", "378 공허함과 분열", "날개 개념 도입"], "teacher_explanations": [{"topic": "삶의 객관적인 목적과 종교적 연결", "explanation": "우리가 삶을 살아가면서 삶의 목적이 뭔가에 대해서 생각을 해봤어? 종교에서는 이걸 다 얘기하거든. 하나님이 우리를 만든 목적이 있다고 얘기하잖아. 불교에서도 마찬가지야. 이 삶에서 무언가를 배우고 성장하기 위해서 왔다고 얘기해. 에니어그램도 마찬가지야. 우리가 이 물질세계에서 살면서 뭔가를 배우고 성장하기 위해서 왔다는 거야. 그래서 에니어그램이 종교와 연결되는 이유가 거기 있어. 에니어그램은 단순한 심리학이 아니라 영적인 도구이기도 해. 그래서 이 에니어그램을 통해서 내가 이 삶에서 뭘 배워야 하는지를 알 수 있어."}, {"topic": "에니어그램 도형의 의미", "explanation": "에니어그램 도형이 왜 이렇게 생겼는지 알아? 원이 있고, 삼각형이 있고, 헥사드라는 여섯 개의 선이 있잖아. 원의 의미는 연결성이야. 온전성이야. 우리가 다 연결되어 있다는 거야. 9가지 유형이 다 연결되어 있고, 다 하나야. 삼각형은 삼원성을 나타내는 거야. 본능, 사고, 감정 이 세 가지야. 이 세 가지가 우리 삶의 핵심 기능이야. 그리고 헥사드는 역동성을 나타내. 삶이 고정되어 있지 않고 계속 움직이고 변화한다는 거야. 이 도형을 이해하면 에니어그램이 단순한 숫자 분류가 아니라는 걸 알 수 있어."}, {"topic": "7번 유형의 왜곡: 폭음폭식", "explanation": "7번의 원래 순수한 열정이 뭐냐면, 흥미 있는 것에 바로 행동으로 옮기는 거야. 뭔가 재밌고 새로운 것이 있어. 그러면 바로 가는 거야. 그게 7번의 순수한 열정이야. 그런데 이게 왜곡되면 어떻게 되냐면 폭음폭식이 돼. 왜냐? 음식이 눈앞에 있어. 맛있어 보여. 바로 먹는 거야. 그런데 원래 그 순수한 열정이 이렇게 쉽게 얻을 수 있는 것들로 가버리면 왜곡이 되는 거야. 진짜로 재밌고 의미 있는 것들을 향해 그 에너지를 써야 되는데, 그냥 눈앞에 있는 즐거움으로 가버리는 거야. 그래서 7번들이 다이어트가 잘 안 되는 이유가 거기 있어. 그 순수한 열정이 엉뚱한 데로 가는 거거든."}, {"topic": "378번 그룹의 감정 무의식과 공허함", "explanation": "3번, 7번, 8번이 왜 공허함을 느끼냐면, 이 세 유형이 다 감정이 무의식에 있거든. 감정을 의식적으로 쓰지 않아. 그러니까 뭔가를 해도 진짜 충족감이 안 와. 뭔가 허전해. 왜냐면 감정을 느끼지 않으니까. 그 충족감이 감정에서 오거든. 그래서 378번들한테 공통적으로 나타나는 게 아무리 많이 이루어도 허전하다는 거야. 성취를 해도 기쁨이 잘 안 와. 그런데 이 공허함을 메우려고 더 많은 걸 이루려고 해. 그래도 채워지지 않아. 왜? 감정을 안 쓰니까. 감정의 기능이 충족감이거든. 그러니까 이 유형들한테는 감정을 개발하는 게 되게 중요해."}, {"topic": "일기 쓰기의 중요성과 방법", "explanation": "내가 일기 쓰라고 하는 이유가 있어. 그냥 일기가 아니야. 감정 일기야. 오늘 어떤 감정이 들었는지, 어떤 상황에서 그 감정이 들었는지, 그 감정이 어디서 오는 것 같은지를 쓰는 거야. 왜냐면 우리가 감정을 의식적으로 다루지 않으면 감정이 무의식으로 가버려. 그러면 나도 모르는 사이에 내 행동을 감정이 컨트롤하게 돼. 그걸 막으려면 감정을 의식화해야 돼. 일기 쓰는 게 그 과정이야. 그리고 관계 일기도 써. 어떤 사람과 어떤 교류를 했는지, 그때 내가 어떤 감정이었는지. 이게 쌓이면 내 패턴이 보여. 나는 이런 상황에서 이런 감정이 들고, 이런 사람한테 이런 반응을 한다는 게 보이는 거야."}, {"topic": "분열 방향의 이중적 기능", "explanation": "분열 방향이 나쁜 게 아니야. 이게 되게 중요한 포인트야. 분열 방향의 기능이 있어. 뭐냐면 최소한 방어선이야. 너 이렇게라도 해야 너 삶을 포기하지 않는다는 최소한의 방어선이야. 예를 들어서 7번이 분열하면 1번으로 가잖아. 갑자기 계획적이 되고 엄격해지잖아. 이게 나쁜 게 아니야. 7번이 너무 즉흥적이고 무계획하면 삶이 어떻게 돼? 그냥 흘러가버려. 그래서 이 분열 방향이 최소한 너 계획이라도 세워라는 방어선을 쳐주는 거야. 그러니까 분열이 왔을 때 이걸 나쁜 것으로만 보지 말고, 지금 내가 어떤 상태인지를 알려주는 신호로 봐. 그리고 이걸 의식적으로 쓸 수도 있어. 알고 쓰면 괜찮아."}, {"topic": "감정 경험과 성장의 관계", "explanation": "감정 경험이 왜 중요하냐면, 이론으로 아는 것과 실제로 경험해서 느끼는 건 완전히 달라. 머릿속으로 아는 거랑 경험을 해서 느낀 거랑 완전 다르거든. 그거를 자꾸 너가 경험을 해봐야 돼. 감정에 대한 경험. 예를 들어서 슬픈 감정이 들어. 근데 그걸 회피해버리면 데이터가 없는 거야. 슬픔을 겪어봐야 다음에 비슷한 상황이 왔을 때 아 이게 슬픔이구나 하고 알 수 있거든. 그 과정이 힘들지. 근데 그걸 해야 성장이 돼. 그러니까 불편한 감정이 들어도 피하지 말고 느껴봐. 그 감정은 어차피 지나가. 감정은 결코 오랫동안 남아있지 않거든. 계속 느껴주면 점점 익숙해지고, 그 감정을 다룰 수 있게 돼."}, {"topic": "용기를 달라는 기도의 의미", "explanation": "이게 되게 중요한 얘기야. 누군가가 하나님한테 용기를 달라고 기도를 해. 그러면 어떻게 되냐? 용기를 주는 게 아니라 용기를 낼 수 있는 상황이 주어져. 이게 뭔 말이냐면, 능력은 경험을 통해서만 쌓인다는 거야. 그냥 뚝딱 주어지지 않아. 용기를 낼 수 있는 상황을 줘. 그러면 거기서 용기를 내면 용기 있는 사람이 되는 거야. 이게 삶의 원리야. 그러니까 내가 뭔가를 원해. 그러면 그걸 얻을 수 있는 상황이 주어져. 근데 거기서 그걸 해내야 하는 거야. 그냥 앉아서 바란다고 주어지는 게 아니야. 그래서 기회가 왔을 때 그게 힘들더라도 해야 되는 거야."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["최근 일주일 동안 가장 불편했던 감정이 무엇이었나요? 그 감정을 어떻게 처리했나요?", "2번, 3번, 4번 유형이 왜 각각 자만심, 속임수, 시기심이라는 왜곡된 열정을 갖는지 생각해 보세요. 이 구조를 참고해서 설명해 보세요.", "일기를 써보세요. 오늘 어떤 감정이 들었는지, 어떤 상황에서 그 감정이 들었는지, 그 감정의 원인이 무엇인지 적어보세요.", "내가 가장 어려워하는 사람 유형이 있다면 그 사람의 에니어그램 번호를 추측해보고, 왜 그 사람이 그런 행동을 하는지 에니어그램 관점에서 이해해 보세요."], "key_concepts": ["에니어그램 도형의 의미", "9가지 열정과 왜곡", "378 그룹의 특성", "감정 일기", "분열 방향의 이중적 기능", "수준 7-9의 발달 단계", "용기는 경험을 통해 쌓인다"]}, {"date": "2025-09-26", "session_num": 3, "filename": "", "book_chapter": "제2장: 9가지 유형 심화 (pp.40+)", "topics_covered": ["분열/성장 방향 구조", "삼각형 그룹 (378/126/459)", "1번↔4번 연결", "연예인 유형 분석"], "teacher_explanations": [{"topic": "1번이 분열할 때 4번처럼 보이는 이유", "explanation": "1번의 분열 방향이 4번이야. 왜 그러냐면 구조를 봐봐. 1번은 본능이 중심이고 사고가 통제해주고 있잖아. 감정은 무의식에 눌려있어. 그러니까 평소에 감정을 많이 억압하거든. 1번들이. 그런데 이 억압된 감정이 어느 순간 터지면 어떻게 되느냐. 감정이 터지면서 사고랑 붙어버려. 사고감정이 붙으면 뭐가 생기냐? 이미지가 생기고 과거를 돌아보고 이런 게 생기잖아. 그러면 4번처럼 보이는 거야. 왜냐면 4번이 사고감정이 붙어있거든. 그래서 1번이 분열하면 갑자기 감정적이 되고 과거를 자꾸 돌아보고 자기가 얼마나 힘들었는지를 막 얘기하고 이렇게 돼. 근데 본질은 1번이야. 그래서 분열 방향의 유형처럼 완전히 변한 게 아니라 그 유형의 특성이 튀어나오는 거야."}, {"topic": "7번이 1번한테 배워야 할 것", "explanation": "7번의 분열 방향이 1번이야. 그러니까 7번이 분열하면 갑자기 엄격해지고 완벽주의적이 돼. 이때 뭘 배워야 되냐? 1번의 어떤 특성을 배워야 하냐면 두 가지야. 첫 번째는 사고를 유연하게 쓰는 거야. 1번들은 기준이 있고 원칙이 있고 그걸 잘 따르잖아. 그런데 그게 너무 경직되면 안 좋아. 유연하게 쓸 줄 알아야 해. 그게 7번한테 필요한 거야. 두 번째는 본능 기능을 온전히 쓰는 거야. 1번들은 본능이 중심이잖아. 현실을 직접 경험하고 몸으로 부딪히는 거야. 7번들이 자꾸 머릿속으로만 생각하고 실제 행동으로 안 옮기잖아. 그래서 1번한테서 현실로 나오는 법, 직접 경험하는 법을 배워야 해."}, {"topic": "7번의 성장 방향 5번: 과거를 돌아보고 깊어지기", "explanation": "7번이 성장하면 5번처럼 돼. 5번이 어떤 유형이야? 사고감정이 붙어있어. 그래서 깊이 생각하고, 과거를 돌아보고, 이미지를 그려보는 거야. 7번들은 원래 미래 지향적이야. 앞만 보고 달려가잖아. 과거를 돌아보지 않아. 근데 성장하면 5번처럼 과거도 돌아볼 수 있게 돼. 내가 왜 이렇게 됐는지, 어떤 경험이 나를 이렇게 만들었는지를 볼 수 있게 되는 거야. 그리고 더 깊이 생각할 수 있게 돼. 피상적으로만 생각하는 게 아니라 본질을 파고드는 거야. 그게 5번의 강점이거든. 그래서 7번이 성장하면 훨씬 더 지혜로워지고 깊어지는 거야."}, {"topic": "378, 126, 459 구조 그룹의 원리", "explanation": "이 세 그룹이 구조적으로 어떻게 다르냐면, 378은 본능과 사고가 붙어있는 그룹이야. 본능과 사고가 연결되어 있어서 현실적이고 전략적이야. 그런데 감정이 무의식에 있어. 126은 본능과 감정이 붙어있어. 그래서 감정적으로 현실을 처리하는 거야. 관계 중심이고 따뜻해. 그런데 사고가 분리되어 있어. 459는 사고와 감정이 붙어있어. 그래서 머릿속으로 이미지를 만들고 상상하고 깊이 생각하는 거야. 현실 경험보다 내면의 세계가 더 풍부해. 이 세 그룹이 서로 다른 방식으로 세상을 처리하는 거야. 그래서 이 그룹을 알면 그 사람이 어떤 방식으로 삶을 살아가는지 이해할 수 있어."}, {"topic": "1번과 4번이 베프가 되는 이유", "explanation": "1번과 4번이 실제로 베프가 많아. 왜냐면 1번이 힘들 때 4번이 뭘 해줘? 마음을 이해해주고 위로해줘. 정말 힘들었겠다. 이렇게 해주거든. 그게 1번한테 되게 필요한 거야. 왜냐면 1번은 감정이 눌려있잖아. 그런데 4번은 감정을 아주 솔직하게 보여주잖아. 본능을 억압하면서. 그래서 1번한테 너 억압하지 말고 감정도 돌봐줘도 된다는 조언을 해줄 수 있어. 그게 1번한테 진짜 필요한 성장 포인트거든. 근데 여기서 중요한 게 베프만 되는 게 중요한 게 아니야. 사실 조언을 받아들여야지 사실은. 1번이 4번한테서 감정을 돌봐주는 법을 배워야 해. 그게 진짜 성장이야."}, {"topic": "분열 방향의 방어선 기능", "explanation": "분열은 빠지면 나쁜 거가 아니라 절반은 맞고 절반은 틀린 거야. 이게 항상 분열 방향에 대해서 생각할 때 기억해야 돼. 분열이 왜 생기냐면 내가 원래 장점을 발휘 못하는 상황이 돼. 그래서 최소한 이렇게라도 해야 삶을 포기하지 않는다는 방어선을 치는 거야. 예를 들어서 7번이 계획을 안 세우면 어떻게 돼? 그냥 흘러가버려. 그래서 분열 방향인 1번이 나와서 계획을 세우게 해주는 거야. 그게 나쁜 게 아니야. 문제는 거기에 완전히 빠져버리면 안 된다는 거야. 인지하고 선택적으로 쓰면 괜찮아. 근데 모르는 채로 분열에 빠지면 그게 더 심해지면서 악화돼."}, {"topic": "9번 유형의 나태와 합리화 메커니즘", "explanation": "9번들의 나태가 어떻게 나타나냐면 이게 진짜 재밌어. 논리가 있어. 나름의 논리가. 이게 어떤 논리냐면, 분열 방향이 6번이잖아. 그러면 갑자기 미래에 대한 두려움이 생기는 거야. 예를 들어서 약대 공부를 열심히 했어. 근데 갑자기 이런 생각이 드는 거야. 내가 이걸 열심히 해서 결국 떨어지면 어떡하지? 8개월 동안 열심히 했는데 떨어지면 그 에너지가 다 낭비야. 그러면 지금 그만두는 게 낫지 않냐? 그러면 적어도 에너지는 아끼잖아. 이게 너무 논리적이야. 맞는 말 같아. 근데 이게 나태야. 쉬운 길을 택하는 거야. 이걸 조언해줄 때는 방법을 구체적으로 알려줘야 돼. 이렇게 해야 된다가 아니라 왜 그런 행동을 하고 있는지 논리적으로 알려줘야 해."}, {"topic": "날개의 조언자 기능", "explanation": "날개가 뭔지 알아? 날개는 조언자야. 내 본 성격이 뭔가를 하려고 할 때 옆 번호한테 조언을 받는 거야. 그래서 내가 9번이야. 근데 날개가 1번이면, 1번이 이렇게 조언해줘. 야 너가 마음이 편안하고 싶어? 그럼 결점 없이 완벽하게 해야 돼. 그래야 마음이 편안해. 이렇게 조언을 받아들이면 날개가 1번인 거야. 날개가 8번이면 8번이 이렇게 얘기해줘. 야 너가 편안하고 싶어? 그럼 니 하고 싶은 거 해. 그냥 다른 사람 신경 쓰지 말고 니 원하는 거 하면 돼. 이렇게 받아들이면 날개가 8번인 거야. 그래서 같은 9번이어도 날개에 따라서 완전히 달라 보일 수 있어."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["2번, 3번, 4번이 왜 자만심, 속임수, 시기심이라는 왜곡된 열정을 갖는지, 본능-감정-사고 구조를 바탕으로 설명해 보세요. (지난 세션 숙제 검토)", "내 주변에서 9번 유형처럼 보이는 사람이 있나요? 그 사람이 포기를 결정할 때 어떤 식으로 합리화하는지 관찰해 보세요.", "내가 스트레스를 받을 때 나타나는 행동 패턴이 무엇인지 적어보세요. 그게 내 분열 방향의 특성과 연결되나요?", "에니어그램 책 53-54페이지의 기본 두려움과 욕망의 왜곡 표를 읽고, 내 번호의 기본 두려움과 기본 욕망이 무엇인지, 어떻게 왜곡되는지 정리해 보세요."], "key_concepts": ["378 그룹 (본능-사고 붙음)", "126 그룹 (본능-감정 붙음)", "459 그룹 (사고-감정 붙음)", "날개의 조언자 역할", "성장 방향의 연쇄", "발달 수준 7-9의 위험성"]}, {"date": "2025-10-17", "session_num": 4, "filename": "", "book_chapter": "제2장: 2번·3번 유형 (pp.40+)", "topics_covered": ["2번 자만심과 조력", "3번 속임수와 GAP", "감정 중심 수치심", "일론머스크·전현무 사례"], "teacher_explanations": [{"topic": "2번 유형의 자만심(pride) 구조적 이해", "explanation": "2번의 큰 죄가 왜 자만심이냐면, 구조를 봐봐. 2번은 본능이 중심이고 감정이 통제해주고 있잖아. 그러면 본능의 기능 중에서 감정이 통제하는 기능이 뭐냐면 자기 자신한테 집중하는 기능이야. 그러니까 본능이 자기한테 집중하려는데 감정이 그걸 통제하니까 어떻게 되냐면, 자기한테 집중하는 게 아니라 다른 사람한테 집중하는 거야. 자기 욕구를 억압하고 다른 사람을 돌봐주는 거지. 그러면 다른 사람한테 도움을 주면서 그 보상으로 인정을 받으려고 해. 내가 이만큼 해줬는데 당연히 인정받아야지, 당연히 고마워해야지 이게 자만심이야. 이 생각 자체가 자만심이거든. 내가 얼마나 해줬는지에 대한 자의식이 자만심으로 나타나는 거야."}, {"topic": "3번 유형의 속임수(deceit) 구조적 이해", "explanation": "3번이 왜 속임수냐면, 3번은 본능이 중심이고 사고와 감정이 붙어있잖아. 그러면 사고감정이 붙으면 뭘 만들어내? 전략이랑 가면이야. 이미지를 만들고 그걸로 현실에서 뭔가를 성취하려는 거야. 그게 3번이야. 근데 이 이미지가 실제 자기 모습과 다를 수 있잖아. 그런데 3번들은 그 이미지가 자기라고 믿어. 자기 이미지가 곧 자기라고 생각하는 거야. 그게 속임수야. 타인을 속이는 게 아니라 자기가 자기를 속이는 거야. 실제로 내가 어떤 사람인지보다 내가 어떻게 보이는지가 더 중요한 거야. 그래서 3번들이 성공한 것처럼 보여도 실제 내실이 없을 때가 많아."}, {"topic": "감정 중심의 고착: 수치심", "explanation": "가슴형 2번, 3번, 4번은 감정 중심이잖아. 근데 감정이 고착되면 뭐가 생기냐? 수치심이야. 나는 다른 사람에게 가치가 없을지도 모른다는 수치심이 핵심이야. 이 수치심을 회피하기 위해서 각 번호가 다른 전략을 쓰는 거야. 2번은 다른 사람한테 없어서는 안 될 존재가 되려고 해. 내가 필요한 존재가 되면 가치가 있는 거니까. 3번은 뭔가를 성취해서 보여줘. 내가 이런 걸 이뤘어, 그러니까 가치가 있어. 4번은 자기가 특별하다는 거를 통해서 가치를 증명하려고 해. 다 방법은 다르지만 수치심을 회피하려는 같은 목적이야."}, {"topic": "3번의 분열과 성장 방향", "explanation": "3번의 분열 방향이 9번이야. 그러니까 3번이 분열하면 갑자기 무기력해지고 아무것도 안 하려고 해. 9번처럼 그냥 있고 싶어 하는 거야. 이게 왜 분열이냐면 원래 3번은 계속 뭔가를 이루고 성취하려는 사람인데, 그 뭔가를 더 이상 할 수 없거나 의미를 잃어버렸을 때 9번의 나태함으로 빠지는 거야. 성장 방향은 6번이야. 3번이 성장하면 6번처럼 돼. 6번이 어떤 유형이야? 연대의식이야. 다른 사람들과의 관계를 중시하고 그 안에서 진짜 가치를 찾는 거야. 그래서 성장한 3번은 자기 성취를 위한 게 아니라 진짜로 다른 사람을 위해서 뭔가를 해. 일론 머스크가 스타링크를 무료로 제공한 게 그 사례야."}, {"topic": "날개 개념 설명", "explanation": "날개가 뭔지 이제 정확히 알려줄게. 날개는 내 번호 양쪽에 있는 번호야. 그 번호의 특성이 내 행동에 영향을 줘. 그런데 날개가 어떤 역할이냐면 조언자야. 내가 뭔가를 하려고 할 때 옆 번호한테 어떻게 하면 되냐고 묻는 거야. 그러면 그 번호가 자기 관점에서 조언을 해줘. 그 조언을 받아들이면 그 날개를 쓰는 거야. 그래서 같은 번호여도 날개에 따라 완전히 달라 보일 수 있어. 날개를 하나만 쓸 수도 있고, 두 개를 번갈아 쓸 수도 있어. 그런데 하나가 더 강할 때가 많아. 그걸 dominant wing이라고 해. 그리고 날개는 성격의 핵심이 아니야. 핵심은 본 번호야."}, {"topic": "삼수 시절 학생 가르친 경험과 2번 특성", "explanation": "내가 삼수 할 때 얘기야. 그때 우리 집 아래층에 학생이 하나 있었어. 그 학생을 내가 가르쳐 줬거든. 공부를 막 도와줬어. 당시에 나는 그냥 도와주고 싶어서 한 거야. 근데 엄마한테 등짝을 맞았어. 왜 남 공부를 도와주냐고. 네 공부나 해라고. 그때 나는 왜 그랬는지 몰랐어. 근데 에니어그램을 알고 나서 알았어. 그게 2번의 특성이야. 내가 2번 날개를 갖고 있거든. 다른 사람을 도와주고 싶은 충동이 있어. 그게 자연스럽게 나오는 거야. 그래서 에니어그램을 알면 내가 왜 그런 행동을 했는지 이해할 수 있어. 그 행동의 동기가 보이거든."}, {"topic": "전현무와 빅뱅 승리의 3번 분석", "explanation": "전현무가 3번이야. 그리고 빅뱅 승리가 3번 분열 심화 사례야. 3번들이 잘 나갈 때는 되게 매력 있어. 사교적이고 성공적으로 보이고. 근데 분열로 가면 어떻게 되냐면 자기 이미지를 위해서라면 뭐든 해. 그게 극단으로 가면 승리처럼 되는 거야. 자기가 어떻게 보이느냐가 너무 중요하니까, 그 이미지를 위해서라면 비윤리적인 것도 할 수 있어. 그게 3번이 분열의 9단계까지 가면 나타나는 모습이야. 전현무는 아직 평균 범위야. 그런데 여기서 중요한 게 뭐냐면, 3번들은 자기 행동이 잘못됐다는 걸 잘 못 느껴. 왜냐면 자기가 만든 이미지가 자기라고 믿으니까. 그래서 비윤리적인 걸 해도 그게 잘못이라는 인식이 잘 안 와."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["3번 유형의 속임수가 타인을 속이는 것이 아니라 자기 자신을 속이는 것이라는 게 무슨 의미인지 설명해 보세요.", "내 번호의 날개가 무엇인지 확인하고, 그 날개가 어떤 조언을 해주고 있는지 구체적인 행동 사례를 들어보세요.", "주변에 3번처럼 보이는 사람이 있다면, 그 사람이 성취를 추구하는 행동 중에 진짜 내실이 있는 것과 이미지만 있는 것을 구분해 볼 수 있나요?"], "key_concepts": ["2번의 자만심 구조", "3번의 속임수 구조", "감정 중심의 수치심", "3번의 분열(9번)과 성장(6번)", "날개의 dominant wing"]}, {"date": "2025-10-24", "session_num": 5, "filename": "", "book_chapter": "제2장 심화: 2번·3번 분열/성장 방향", "topics_covered": ["4번 시기심·우울 자아이미지", "처남 ROTC 부상 사례", "기안84 사례", "4번+8번 커플 구조"], "teacher_explanations": [{"topic": "4번 유형의 시기심(envy) 구조적 이해", "explanation": "4번의 큰 죄가 시기심이야. 왜냐면 구조를 봐봐. 4번은 사고감정이 붙어있잖아. 그리고 본능이 무의식에 있어. 그러니까 본능이 억압되어 있어. 본능이 억압되어 있다는 게 뭐냐면, 현실에 직접 나와서 행동하는 게 힘들어. 대신에 사고감정으로 머릿속에서 이미지를 만들잖아. 과거를 돌아보고 이미지를 만들면서 현재를 살아. 그러다 보니까 어떤 문제가 생기냐면, 다른 사람들은 저렇게 잘 살고 있는데 나는 왜 이럴까. 이런 생각이 자꾸 들어. 왜냐면 나는 현실로 나오지 못하고 머릿속에서만 살고 있으니까. 그게 시기심이야. 저 사람은 저걸 갖고 있는데 나는 왜 없지. 저 사람은 저렇게 되는데 나는 왜 안 되지. 이런 비교에서 시기심이 나오는 거야."}, {"topic": "4번의 우울한 자아이미지", "explanation": "4번들이 자아이미지가 우울해. 왜냐면 본능이 무의식에 있다 보니까 현실 경험이 적어. 그러니까 실제로 내가 무언가를 이루고 성취하는 경험이 부족해. 그러면 자아이미지가 어떻게 되냐? 나는 별로인 사람이야, 나는 안 되는 사람이야 이렇게 형성돼. 근데 사고감정이 붙어있으니까 이게 이미지로 만들어지는 거야. 그러니까 머릿속에서 굉장히 선명하게 우울한 자기 이미지를 그리는 거야. 그리고 그걸 현실처럼 느껴. 왜냐면 사고감정이 붙어있으면 상상이 현실처럼 느껴지거든. 그게 4번의 핵심이야. 실제 현실이 아닌데 머릿속에서 만든 우울한 이미지를 현실처럼 느끼는 거야."}, {"topic": "459번 그룹의 심연 추락 위험", "explanation": "4번, 5번, 9번이 다 사고감정이 붙어있잖아. 그러면 상상이 현실처럼 느껴져. 근데 여기서 중요한 게 있어. 이 그룹들이 공통적으로 현실과의 연결 고리가 약해. 본능이 무의식에 있으니까. 현실로 나오는 힘이 약해. 그러면 어떻게 되냐? 심연으로 추락할 수 있어. 머릿속에서만 너무 깊이 들어가다가 현실로 돌아올 수 없게 되는 거야. 그게 우울증이 되고 심하면 자살로 이어질 수 있어. 4번이랑 5번은 특히 이 위험이 커. 왜냐면 사고감정이 붙어있어서 생각이 너무 깊어지고 감정이 그 생각과 연결되면서 굉장히 강렬한 감정 상태가 되는데, 현실로 나오는 힘이 없으면 거기서 헤어 나오지 못하는 거야."}, {"topic": "459번 그룹의 고강도 운동 권장과 주의사항", "explanation": "459번 그룹들한테 고강도 운동을 권장해. 왜냐면 본능이 무의식에 있잖아. 현실로 나오는 힘이 약해. 그래서 몸을 강하게 쓰는 운동이 필요해. 그게 본능을 깨우는 거야. 근데 여기서 조심해야 될 게 있어. 459번들이 운동을 하다가 다치는 경우가 많아. 왜냐면 감정 때문이야. 운동을 할 때 엔돌핀이 나오잖아. 그러면 감정이 이걸 잡아버려. 엔돌핀 쾌감에 빠지는 거야. 그러면 무리하게 돼. 몸이 힘들다는 신호를 보내는데 감정이 이 쾌감을 계속 느끼려고 하니까 그냥 계속 해. 그러다가 다치는 거야. 그래서 459번들은 운동할 때 자기 몸 상태를 객관적으로 봐야 해."}, {"topic": "4번과 5번의 연결고리 없음과 심연", "explanation": "4번과 5번이 공통적으로 갖는 특성이 있어. 연결 고리가 없어. 이게 무슨 말이냐면, 사고감정이 붙어있으면서 본능이 무의식에 있잖아. 그러면 현실과 내면 세계 사이에서 연결이 끊기는 느낌이야. 현실로 나와야 하는데 그게 안 되는 거야. 그러면 어떻게 되냐? 머릿속에서 만든 세계가 너무 깊어져. 점점 더 깊이 들어가다가 어느 순간 심연에 빠지는 거야. 그 심연이 우울증이야. 4번들이 우울증 비율이 높은 이유가 거기 있어. 5번도 마찬가지야. 그래서 이 유형들한테는 현실과의 연결 고리를 만들어주는 게 치료야. 몸을 쓰고, 사람들과 교류하고, 현실에서 실제로 무언가를 해내는 경험이 중요해."}, {"topic": "9번이 바람을 피우는 이유", "explanation": "9번이 왜 바람을 피우냐면, 9번의 본질적인 욕망이 뭐야? 마음의 평안이야. 삶이 편안하게 흘러가는 거야. 그런데 현실의 파트너와의 관계에서 갈등이 생기면 어떻게 돼? 불편해. 그 불편함을 9번들은 못 견뎌. 그러면 그 불편함을 회피하려고 해. 근데 헤어지는 것도 불편해. 큰 변화가 싫으니까. 그러면 어떻게 하냐? 그냥 다른 사람을 만나는 거야. 현재 관계를 유지하면서 다른 곳에서 편안함을 찾는 거야. 그게 9번의 바람 메커니즘이야. 적극적으로 새로운 관계를 만들려는 게 아니라 현재의 불편함에서 도망치다 보니까 그렇게 되는 거야."}, {"topic": "컨설팅 학생 사례: 4번의 불필요한 정황 설명", "explanation": "선생님한테 상담받으러 온 학생이 있어. 4번이야. 근데 질문을 할 때 어떻게 하냐면, 질문을 하기 전에 배경 설명이 엄청 길어. 이런 일이 있었고, 이런 상황이었고, 이런 맥락이었고... 이렇게 한참을 얘기하다가 질문을 해. 왜 이러냐면 4번들이 자기 이야기를 이해받고 싶은 거야. 단순히 정보를 얻으려는 게 아니라 내 상황이 얼마나 복잡하고 특별한지를 알아줬으면 하는 거야. 그게 4번의 시기심과 연결돼. 나는 특별한 상황에 있는데 남들은 이걸 이해 못할 거야 하는 게 있어. 근데 이렇게 하면 오히려 핵심이 묻혀. 그래서 4번들한테는 핵심부터 얘기하라고 해야 해."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["9번이 바람을 피우는 이유를 에니어그램 구조 관점에서 설명해 보세요. (지난 세션 숙제)", "4번, 5번, 9번 유형에게 고강도 운동이 권장되는 이유가 무엇인지 설명해 보세요.", "내 주변에 4번처럼 보이는 사람이 있다면, 그 사람이 자기 이야기를 어떻게 표현하는지 관찰해 보세요. 질문 전에 배경 설명이 긴가요?", "사고감정이 붙어있는 459 그룹이 상상을 현실처럼 느끼는 게 삶에서 어떤 문제를 만드는지 생각해 보세요."], "key_concepts": ["4번의 시기심 구조", "상상이 현실처럼 느껴지는 구조", "심연 추락 위험", "9번의 바람 메커니즘", "459 그룹의 운동 중 부상 위험"]}, {"date": "2025-10-31", "session_num": 6, "filename": "", "book_chapter": "제2장 심화: 5번·9번 유형", "topics_covered": ["5번 탐욕·에너지 보존", "정신의 깊이 수면 비유", "9번 코끼리 비유", "아인슈타인 사례"], "teacher_explanations": [{"topic": "5번 유형의 탐욕(greed) 구조적 이해", "explanation": "5번의 큰 죄가 탐욕이야. 근데 돈에 대한 탐욕이 아니야. 지식에 대한 탐욕이야. 5번 구조를 봐봐. 사고가 중심이고 감정이 붙어있잖아. 근데 본능이 무의식에 있어. 그러면 어떤 일이 벌어지냐면, 현실로 나와서 직접 경험하는 게 힘들어. 그래서 어떻게 하냐면 지식으로 현실을 대체하려는 거야. 내가 직접 하지 않아도 충분히 알 수 있어, 지식을 쌓으면 돼. 이게 5번의 탐욕이야. 그런데 지식을 아무리 쌓아도 실제 경험이 없으면 채워지지 않아. 그래서 더 많은 지식을 쌓으려고 해. 그게 탐욕이야. 내면의 자원이 부족한 느낌 때문에 계속 더 많이 가지려고 하는 거야."}, {"topic": "5번의 지나친 교류 꺼림과 에너지 관리", "explanation": "5번들이 왜 사람들과 교류를 꺼리냐면, 에너지 관점에서 봐야 해. 5번들은 내면의 에너지가 부족하다고 느껴. 본능이 무의식에 있으니까 현실 에너지가 약해. 그러면 사람들과 교류하는 게 에너지를 많이 쓰는 일이거든. 그래서 교류를 최소화하려는 거야. 자기 에너지를 보존하려는 거지. 이게 탐욕이랑 연결돼. 지식은 에너지를 아끼면서 쌓을 수 있잖아. 책 읽고, 혼자 공부하고. 근데 사람들과 교류하면 에너지가 많이 들어. 그래서 5번들이 내향적인 이유가 단순히 성격이 내향적이어서가 아니라, 에너지를 아끼려는 메커니즘이야."}, {"topic": "정신의 깊이: 수면 깊이 비유", "explanation": "에니어그램에서 정신의 깊이라는 개념이 있어. 이걸 수면 깊이로 비유해볼게. 9번, 7번, 2번은 수면에 가까워. 즉, 가장 긍정적이고 가볍고 현실적이야. 이 유형들은 사람들이랑 잘 어울리고 밝아. 중간쯤에 1번, 3번, 8번이 있어. 그리고 가장 깊은 곳에 4번이랑 5번이 있어. 이게 무슨 말이냐면, 4번이랑 5번은 내면이 가장 깊어. 그래서 생각이 깊고 감정이 복잡하고 세상을 복잡하게 보는 거야. 이게 장점이기도 해. 근데 너무 깊이 들어가면 위험해. 수면이 너무 깊으면 익사할 수 있잖아. 그게 우울증이나 자살이야. 그래서 4번이랑 5번한테는 현실로 자꾸 나오게 해주는 게 중요해."}, {"topic": "5번의 구조 특이성: 하나의 구조 없음", "explanation": "5번의 구조가 좀 특이해. 다른 번호들은 어떤 하나의 구조로 설명되는데, 5번은 구조가 딱 하나로 설명되지 않아. 왜냐면 사고가 중심이고 감정이 붙어있는데, 이 사고감정이 하나처럼 움직이면서 본능이 완전히 분리되어 있거든. 그러면 겉으로 봤을 때 갑갑해 보여. 왜냐면 사고감정만으로 모든 걸 처리하려고 하니까. 현실 경험이 없이 머릿속에서만 다 처리하는 거야. 그러면 실제 행동이 잘 안 나와. 그래서 5번들을 보면 아는 건 많은데 행동이 느리다는 느낌이야. 생각은 다 있는데 몸이 안 따라가는 거야."}, {"topic": "선생님이 5번과 논리 싸움을 하면 힘든 이유", "explanation": "내가 5번이랑 논리 싸움을 하면 되게 힘들어. 왜냐면 5번들이 지식이 방대해. 그리고 논리적이야. 사고와 감정이 붙어있으니까 논리에 감정이 섞여 있어. 그냥 차갑게 논리만 하는 게 아니라 자기가 믿는 논리에 감정이 붙어있는 거야. 그러면 반박하기가 되게 어려워. 왜냐면 논리적으로도 강하고 감정적으로도 확신이 있거든. 그리고 5번들은 에너지를 아끼는 유형인데 논리 싸움을 하기 시작하면 오히려 에너지가 나와. 왜냐면 이게 자기 영역이거든. 지식과 논리. 그래서 선생님이 사고를 굉장히 많이 써야 5번이랑 대화가 되는 거야."}, {"topic": "9번의 바람 숙제 검토: 마음의 평안 추구", "explanation": "지난번에 9번이 왜 바람을 피우냐는 숙제를 내줬잖아. 핵심은 뭐냐면 9번의 본질적인 욕망이 마음의 평안이야. 그리고 9번을 코끼리에 비유할 수 있어. 코끼리가 어떤 동물이야? 변화를 싫어해. 한번 정착하면 거기서 계속 있으려 해. 9번이 그래. 그러면 현재 관계가 불편해지면 어떻게 하냐? 헤어지는 것도 큰 변화야. 너무 불편해. 그래서 그냥 있어. 근데 다른 곳에서 편안함을 찾는 거야. 그게 바람이야. 핑계를 만들어서 이동하는 거야. 이 관계는 불편하니까 저쪽으로 가는 게 더 편하다는 핑계. 그러다 보니까 양다리를 걸치게 되는 거야."}, {"topic": "2번의 바람과 8번과의 관계", "explanation": "2번이 바람을 피우는 메커니즘이 좀 달라. 2번은 다른 사람을 돕고 싶고 교류하고 싶은 욕구가 강하잖아. 근데 이게 솔직한 감정 표현이 어때? 2번들이 자기가 뭘 필요로 하는지, 뭘 원하는지를 직접 말하는 게 어려워. 왜냐면 본능이 감정에 의해 통제되다 보니까 자기 중심을 지키는 게 어려워. 그러면 어떻게 되냐? 다른 사람한테 계속 주다 보면 고갈이 돼. 그런데 그걸 표현 못하면 다른 곳에서 채우려고 해. 그게 8번과 연결이 돼. 2번들이 8번한테 끌리는 이유가 8번이 자기 중심이 확실하거든. 내가 이렇게 살 거야, 내가 이걸 원해. 그게 2번한테 되게 매력적으로 느껴져."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["5번의 탐욕이 돈이 아닌 지식에 대한 탐욕이라는 게 무슨 의미인지, 5번의 구조적 특성과 연결해서 설명해 보세요.", "9번의 바람 메커니즘을 설명하면서 코끼리 비유와 연결해 보세요.", "정신의 깊이 개념에서 4번과 5번이 가장 깊은 이유가 무엇인지, 그게 현실에서 어떤 위험으로 나타날 수 있는지 설명해 보세요."], "key_concepts": ["5번의 탐욕 구조", "5번의 에너지 보존 메커니즘", "정신의 깊이", "5번의 구조 특이성", "9번의 코끼리 특성"]}, {"date": "2025-11-05", "session_num": 7, "filename": "", "book_chapter": "제2장: 6번 유형 전체", "topics_covered": ["6번 사고 무의식", "연대의식과 배신 두려움", "합격생 후기 패턴", "민성이 사례"], "teacher_explanations": [{"topic": "6번의 핵심 구조: 사고 고착이지만 사고가 무의식", "explanation": "6번이 되게 독특해. 사고 고착인데 사고가 무의식에 있어. 이게 무슨 말이냐면, 사고가 중심인데 그 사고를 스스로 쓰기를 겁내는 거야. 왜냐면 자기 생각이 맞는지 틀린지를 자기가 판단할 자신이 없어. 그러니까 어떻게 하냐면 자기 생각을 치워버리고 연대의식을 따라가는 거야. 사회적으로, 집단적으로, 이 그룹에서 좋다고 하는 것들을 자기 생각인 것처럼 받아들이는 거야. 그게 본능감정이 붙어있어서 생기는 연대의식이야. 그러니까 6번들은 자기 생각은 있어. 근데 그 생각을 믿지 못해. 그래서 다른 사람들이 좋다고 하는 걸 따라가는 거야."}, {"topic": "6번의 공부 특성과 시험 패턴", "explanation": "6번들이 공부를 못하는 이유가 있어. 자기 공부법을 못 믿는 거야. 불안하니까. 내가 이렇게 하면 되는 건가? 이 방법이 맞나? 이렇게 자꾸 의심해. 그러면 어떻게 하냐? 합격생 후기를 찾아. 저 사람이 이렇게 해서 됐다. 그러면 이렇게 하면 되겠구나. 그런데 그게 자기한테 안 맞을 수도 있잖아. 근데 그냥 따라가는 거야. 연대의식으로. 그래서 시험장에서도 이런 패턴이 나타나. 날개가 5번인 6번들은 계속 검사해. 맞는지 다시 보고 또 보고. 반면에 날개가 7번인 6번들은 일단 대충 찍고 넘어가. 어차피 더 생각해봤자 모르겠으니까. 이게 같은 6번이어도 날개에 따라 시험 행동이 달라지는 거야."}, {"topic": "6번의 분열 방향 3번: 무작정 열심히와 전략 가면", "explanation": "6번이 분열하면 3번으로 가잖아. 그게 어떻게 나타나냐면 두 가지야. 불안이 너무 심해지면 일단 무작정 열심히 해. 뭘 해야 할지 모르겠어. 근데 가만히 있으면 더 불안해. 그러니까 그냥 해. 아무거나. 그게 3번처럼 보이는 거야. 3번이 성취를 위해서 열심히 하는 거랑 비슷하게 보이지만 동기가 달라. 6번은 불안 때문에 하는 거야. 또 다른 하나가 전략 가면이야. 불안하니까 어떻게 하면 안전할까를 생각하다가 뭔가를 가장하는 거야. 내가 강한 척, 자신 있는 척. 이게 3번의 속임수랑 비슷해 보여. 근데 6번은 여전히 사고 고착이야. 연대의식이 있어. 그게 3번이랑 다른 점이야."}, {"topic": "6번의 명품과 권력 집착 메커니즘", "explanation": "6번들이 분열이 심해질수록 명품을 좋아하거나 권력 있는 집단에 소속되려고 해. 왜냐면 연대의식 때문이야. 내가 어떤 집단에 소속되면 그 집단의 힘이 내 힘이 되는 거잖아. 그러면 불안이 줄어들어. 명품도 마찬가지야. 이걸 들고 다니면 이 브랜드가 주는 이미지가 나한테 붙는 거잖아. 그러면 더 안전하게 느껴지는 거야. 이게 6번의 연대의식이 왜곡된 모습이야. 진짜 연대는 사람들과 진실하게 연결되는 거인데, 분열하면 그게 물질이나 브랜드, 권력과의 연대로 가는 거야."}, {"topic": "6번의 성장 방향 9번: 삶에 영향받지 않으려는 욕구", "explanation": "6번이 성장하면 9번으로 가잖아. 9번이 어떤 유형이야? 삶에 뛰어들어야 하게 되면 어떡하지가 두려워. 평안을 원해. 그러면 6번이 성장할 때 어떻게 되냐면, 두려움 때문에 행동하지 않는 거야. 이게 나쁘게 들릴 수 있어. 근데 이게 성장이야. 왜냐면 6번들이 불안 때문에 계속 뭔가를 하잖아. 합격생 후기 찾고, 이거 해보고 저거 해보고. 근데 성장하면 그런 거에 영향을 덜 받아. 삶이 어떻게 되든 내가 흔들리지 않는다는 게 생기는 거야. 그러면서 자신감이 생겨. 왜냐면 내가 불안 때문에 행동하는 게 아니라 내가 선택해서 행동하는 거니까."}, {"topic": "6번과 배신의 관계", "explanation": "6번들이 배신을 극도로 싫어해. 그리고 6번들이 등에 칼을 꽂을 수 있어. 이게 왜 그러냐면, 6번은 연대의식으로 사는 사람들이야. 내가 어떤 그룹에 속하고 그 그룹의 가치를 따라가는 거잖아. 근데 만약 그 그룹이나 그 사람이 내가 믿었던 가치와 다르게 행동하면 어떻게 되냐? 배신으로 느끼는 거야. 내 이상과 달라졌다는 게 배신이야. 그래서 6번들이 한번 배신감을 느끼면 그냥 등에 칼을 꽂을 수 있어. 왜냐면 이미 배신자니까. 이 사람은 내 편이 아니야. 이렇게 돼버리는 거야. 정재규가 박정희를 암살한 것도 이 메커니즘이야. 자기가 믿고 따르던 사람이 자기 이상과 달라졌다는 배신감."}, {"topic": "6번 카톡 답장이 느린 이유", "explanation": "6번들이 카톡 답장이 느린 이유가 있어. 이게 단순히 바빠서가 아니야. 구조적인 이유야. 6번들은 답장을 생각하면 그 다음에 어떻게 될지가 계속 생각되는 거야. 내가 이렇게 답장하면 저 사람이 이렇게 반응할 수도 있고, 그러면 내가 또 이렇게 해야 하고... 이런 연쇄적인 생각이 드는 거야. 그러니까 답장 하나가 이렇게 많은 생각을 동반해. 그러면 답장하는 게 에너지가 많이 들어. 그래서 미루게 되는 거야. 이게 6번의 불안이야. 내 한 마디가 어떤 결과를 가져올지 모르는 불안. 그래서 답장을 선뜻 못 하는 거야."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["6번이 자기 생각을 불신하고 연대의식을 따라가는 행동이 실생활에서 어떻게 나타나는지 구체적인 예를 들어보세요.", "내 주변에서 6번처럼 보이는 사람이 있다면, 그 사람이 불안을 어떻게 해소하는지 관찰해 보세요.", "6번과 3번이 겉으로 비슷해 보이는 이유가 무엇인지, 어떻게 구분할 수 있는지 설명해 보세요.", "6번 유형이 배신을 극도로 싫어하는 이유를 연대의식과 연결해서 설명해 보세요."], "key_concepts": ["6번의 사고 무의식", "6번의 분열(3번) 특성", "6번의 성장(9번) 특성", "6번의 배신 메커니즘", "6W5 vs 6W7"]}, {"date": "2025-11-21", "session_num": 8, "filename": "", "book_chapter": "제2장 마무리 + 제3장 날개 도입", "topics_covered": ["6번 복습", "7~1번 날개 전체", "아빠(8W9) 사례", "부모→자녀 성격 형성"], "teacher_explanations": [{"topic": "7번 날개의 두려움과 날개별 차이", "explanation": "7번의 기본 두려움이 뭐냐면 내가 그리는 행복한 미래가 현실이 되지 않을까봐야. 그게 7번의 핵심 동기야. 그래서 7번은 미래를 보고 달려가는 거야. 근데 이게 날개에 따라 어떻게 달라지냐면, 7번8날개는 다른 사람 얘기 신경 쓰지 말고 니 하고 싶은 거 해. 이게 8번이 주는 조언이야. 그러면 더 자기 주도적이야. 7번6날개는 사회적으로 괜찮다는 거를 따라가. 이게 6번이 주는 조언이야. 그러니까 7W6은 혼자 달려가는 게 아니라 다른 사람들이 좋다고 하는 방향으로 달려가는 거야. 그래서 7W6인 약사들을 보면 이름 있는 병원이나 유명한 곳을 선호해. 소속이 중요한 거야."}, {"topic": "8번 날개 설명과 아빠(8W9) 사례", "explanation": "8번의 기본 두려움이 뭔지 알아? 다른 사람 뜻대로 하게 될까봐야. 자치권을 빼앗기는 게 두려운 거야. 그래서 8번은 아무도 나를 통제하지 못하게 하려고 해. 그러면 감정을 어떻게 해? 감정을 무의식으로 내려버려. 왜냐면 감정이 다른 사람한테 영향받는 경로거든. 감정을 차단하면 다른 사람 영향을 안 받아. 그래서 8번들이 감정 표현이 없는 것처럼 보이는 거야. 8W9는 일단 성취하고 쉬어라는 조언을 받아. 그래서 안정적인 직장, 공무원 같은 걸 선호해. 내 아빠가 8W9야. LH 공사야. 신의직장이라고들 하잖아. 본사로 오라는 제안도 있었는데 거절했어. 대전에서 편안하게 사는 게 더 좋은 거야."}, {"topic": "9번 날개 설명: 9W8과 9W1의 차이", "explanation": "9번의 기본 두려움은 삶에 뛰어들어야 하게 되면 어떡하지야. 평안이 깨질까봐 두려운 거야. 그래서 9번은 최대한 현재 상태를 유지하려고 해. 9W8은 일단 성취하고 쉬어라는 조언을 받아. 그러니까 마치 도전적이고 리더십 있어 보여. 근데 실제 동기는 뭐야? 빨리 끝내고 쉬고 싶어서야. 이게 중요해. 겉으로 보면 적극적으로 보이는데 실제로는 이걸 빨리 처리하고 편안해지고 싶은 거야. 9W1은 마음이 편안한 게 완벽한 거야. 완벽주의적인 1번의 조언인데 9번한테 들어오면 어떻게 되냐면, 아무것도 하지 마. 차라리 포기해. 이렇게 들리는 거야. 왜냐면 완벽하게 하려면 너무 힘드니까 아예 안 하는 게 낫다는 논리야."}, {"topic": "1번 날개 설명: 1W9와 1W2의 차이", "explanation": "1번의 기본 두려움이 뭐냐면 예상치 못한 일로 통제권을 잃어버리면 어떡하지야. 그래서 1번은 계획 세우는 걸 엄청 좋아해. MBTI에서 J 성향이 강한 번호가 바로 1번이야. 디폴트 MBTI J야. 1W9는 마음 편안한 게 완벽함이야, 연대의식을 따라가. 그래서 안정적인 직업을 선호해. 약사 같은 거. 1W2는 다른 사람을 도와줘. 2번이 조언해주는 거야. 그러면 사업도 할 수 있고 직접 연대도 해. 내 엄마가 1W2야. 충남대 CEO 과정을 다니고 사업을 운영해. 그게 다른 사람과 교류하면서 올바른 일을 한다는 2번의 조언을 받아들인 거야."}, {"topic": "부모가 자녀의 성격에 미치는 영향", "explanation": "이게 진짜 중요한 발견인데, 부모가 자녀를 어떻게 키우느냐가 자녀의 주성격에 영향을 줘. 구체적으로는 이래. 부모가 어떤 면을 통제하느냐, 그 통제당하는 요소가 자녀의 주성격이 될 수 있어. 예를 들어서 내 엄마가 1번이고 아빠가 8W9야. 그러면 어떤 특성들이 통제당했냐면, 1번 엄마는 규범과 기준을 강조했을 거고 8번 아빠는 자치권과 강함을 강조했을 거야. 그러면 자녀는 그 사이에서 어떻게 살아남느냐를 찾다가 사고형으로 갈 가능성이 높아. 5번, 6번, 7번 같은 사고 고착 유형. 왜냐면 사고로 상황을 파악하고 처리하는 게 그 환경에서 살아남는 방법이거든."}, {"topic": "이서진과 도경수의 1번 욕망 억압 사례", "explanation": "1번 유형들이 욕망을 억압해. 왜냐면 1번이 자기 기준을 따르잖아. 그 기준이 사회적으로 올바른 거야. 그러면 자기 욕망이나 원하는 것들이 그 기준에 맞지 않을 때 억압하는 거야. 도경수가 1번이야. 이서진 비서진 있잖아. 거기서 도경수가 되게 눌려있어. 욕망을 표현을 못 해. 그러다가 나중에 인터뷰에서 다 털어놓잖아. 그때까지 쌓인 게 나오는 거야. 이게 1번의 8% 상태야. 평소에는 눌러놓다가 어느 순간 다 터지는 거. 그래서 1번들이 갑자기 욕망을 드러내는 경우가 있어. 그때까지 억압했던 게 나오는 거야."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["7번의 기본 두려움이 행복한 미래가 현실이 안 될까봐라는 것과 8번의 기본 두려움인 다른 사람 뜻대로 하게 될까봐가 각 번호의 행동에 어떻게 나타나는지 비교해서 설명해 보세요.", "9W8이 리더십 있어 보이지만 실제 동기는 빨리 끝내고 쉬고 싶다는 것이 어떤 상황에서 어떻게 나타나는지 설명해 보세요.", "자신의 부모님이 어떤 에니어그램 유형일지 추측해보고, 그 부모님이 어떤 요소를 통제했는지, 그게 나의 주성격 형성에 어떤 영향을 미쳤을지 생각해 보세요.", "1W9와 1W2가 완벽함을 추구하는 방식이 어떻게 다른지 구체적인 직업이나 생활 방식의 예를 들어 설명해 보세요."], "key_concepts": ["7번의 기본 두려움", "8번의 기본 두려움", "9번의 기본 두려움", "1번의 기본 두려움", "부모와 자녀 성격 형성", "9W8의 역설적 리더십", "1번의 욕망 억압과 폭발"]}, {"date": "2025-12-12", "session_num": 9, "filename": "2025. 12. 12. 오전 11_19 _ 녹음.txt", "book_chapter": "4장 (pp.47-54)", "topics_covered": ["성격 방어를 멈추는 것의 의미", "잠자고 있는 상태와 의식", "기본 두려움과 기본 욕망의 메커니즘", "어린 시절 메시지", "불행의 근원: 성격과의 동일시"], "teacher_explanations": [{"topic": "성격 방어를 멈추는 것의 의미", "explanation": "성격 방어를 멈춘다는 게 뭐냐면, 그냥 쉽게 얘기하면 내가 두려워하는 것들이 있잖아. 그 두려워하는 것들을 직면하는 거야. 그러니까 성격이 왜 방어를 하냐면 두려움 때문에 방어하는 거잖아. 그러니까 그 두려움을 직면하는 게 바로 성격 방어를 멈추는 거야. 두려움을 직면하는 거 그게 쉬운 게 아니거든. 왜냐하면, 두렵거든. 근데 그 두려움을 직면함으로써 그게 진짜 두려워할 거냐 아니냐를 알 수 있는 거지. 직면하지 않으면 영원히 두렵잖아. 직면하면 아 이게 진짜로 두려운 건 아니구나를 알 수 있게 되는 거고, 그러면서 이제 성격에서 벗어나는 거지."}, {"topic": "성격과의 동일시가 불행의 근원", "explanation": "불행이 오는 이유가 내가 이 성격과 동일시 여기기 때문이야. 내가 성격이라고 생각하는 거지. 내 성격이 나야 이렇게 생각하는 거잖아. 근데 그게 내가 아니거든. 성격은 내가 아니야. 그래서 내가 성격과 동일시 여김으로써 성격이 주는 두려움, 욕망, 이런 것들이 나의 것이라고 착각을 하는 거야. 근데 그게 내 거가 아니거든. 성격의 것인 거지. 그러니까 성격에서 벗어나야 그게 내 거가 아니라는 걸 알게 되고, 그러면서 자유로워지는 거야."}, {"topic": "기본 두려움과 기본 욕망의 관계", "explanation": "기본 두려움이 있으면 반드시 기본 욕망이 생겨. 세트야 이게. 두려움이 있으면 그 반대가 욕망이 되는 거야. 두려움이 있는 거에 대한 반대가 욕망이 되는 거야. 그래서 예를 들면은 7번 같은 경우는 기본 두려움이 고통이거든. 고통이 오는 것에 대한 두려움이 있어. 그러면 욕망은 뭐다? 행복하고 싶다는 거야. 고통과 반대되는 행복을 원한다는 거지. 그래서 기본 두려움이 있으면 반드시 기본 욕망도 세트로 온다는 거야."}, {"topic": "어린 시절 메시지와 성격 형성", "explanation": "어린 시절 메시지라는 게 있어. 어렸을 때 어떤 메시지를 받았느냐가 성격 형성에 영향을 미친다는 거야. 예를 들면은 어렸을 때 뭔가를 잘했는데 칭찬을 많이 받았어. 그러면은 그게 자아 이미지가 되는 거야. 나는 이렇게 하면 인정받는 사람이구나. 이렇게 자아 이미지가 만들어지는 거지. 어릴 때는 어떻게 살아남을지에 대한 전략을 세우는 거야. 그게 성격이 되는 거지. 살아남기 위한 전략인 거야. 그러니까 어린 시절에 어떤 환경에서 어떤 메시지를 받았느냐가 성격에 굉장히 중요한 역할을 한다는 거야."}, {"topic": "성격에서 벗어나야 선택권이 생긴다", "explanation": "성격에서 벗어나야 선택권이 생겨. 성격대로만 살면 선택권이 없어. 왜냐하면, 성격은 자동으로 반응하거든. 어떤 자극이 오면은 성격대로 반응이 나오는 거야. 그런데 성격에서 벗어나면 어떤 자극이 왔을 때 내가 어떻게 반응할지 내가 선택할 수 있어. 그게 진정한 의미의 자유라는 거지. 성격에 갇혀 있으면 선택이 없어. 성격대로만 하게 되는 거야. 그러니까 성격에서 벗어나는 게 자유로워지는 거고, 그게 애니어그램을 공부하는 이유야."}, {"topic": "7번 유형 신유나의 기본 두려움과 욕망", "explanation": "7번 유형들의 기본 두려움은 고통이야. 감정적인 고통, 육체적인 고통, 이런 것들이 오는 게 두려운 거야. 그래서 욕망은 행복이야. 행복하고 싶어. 근데 그 행복을 추구하는 방식이 문제인 거야. 진짜 행복이 뭔지를 모르고 고통을 피하는 것을 행복이라고 생각하는 거야. 그래서 자꾸 즐거운 것만 찾고 재미있는 것만 찾고 이렇게 되는 거지. 근데 그게 진짜 행복이 아니거든. 고통을 회피하는 것이지. 그러니까 이 두 가지가 세트야. 두려움이 해결되면 욕망도 자연스럽게 해결이 돼."}], "examples_analogies": [{"context": "", "content": "내가 가르치던 학생 중에 진상이 있었어. 24살인데 자기가 뭘 좀 안다고 생각하는 애야. 수업 시간에 자꾸 딴지를 걸어. 자기 의견을 막 얘기하고. 근데 그게 5번이거든. 5번은 자기가 알고 있는 지식 안에서만 세상을 봐. 그래서 그 경계 밖에 있는 거는 잘 못 받아들이는 거야. 그러니까 딴지 거는 것처럼 보이지만, 사실 5번 성격대로 반응하는 거야. 자기 지식 경계 안에서 검증이 안 됐으니까. 그게 이해가 되면 덜 힘들지."}, {"context": "", "content": "우리 1번 집주인이 있었어. 쌍욕을 했거든. 근데 그게 1번이 옳고 그름으로 판단하는 거야. 자기가 이건 맞아, 이건 틀려로 세상을 보는 거야. 그래서 자기 기준에서 틀렸다고 판단되면 분노가 나오는 거야. 근데 그 분노가 쌍욕으로 나온 거지. 1번들이 분노할 때는 진짜 그게 틀렸다는 확신이 있어서 하는 거야. 자기 기준에서. 그래서 1번들이 쌍욕하거나 엄청 화내는 거는 그게 자기 기준의 정의감 때문이야."}, {"context": "", "content": "7번인 썸남이 있었는데, 갑자기 연락을 끊은 거야. 근데 그게 7번 성격 때문이야. 7번은 감정적인 고통이 오면 도망가거든. 그 고통을 피하기 위해서. 그러니까 관계가 깊어지면서 뭔가 부담스럽거나 감정적으로 무거운 게 느껴지면 자꾸 그냥 연락을 끊거나 도망가게 되는 거야. 7번이라서 그런 거야. 악의가 있어서가 아니라 성격대로 반응한 거야."}], "training_questions": ["자신의 기본 두려움과 기본 욕망이 어떻게 연결되어 있는지 구체적인 사례로 설명해보세요.", "성격과 동일시여긴다는 것이 무슨 의미인지 자신의 경험을 통해 설명해보세요.", "어린 시절에 받은 메시지 중 자신의 성격 형성에 영향을 미쳤을 것 같은 것이 있나요?", "성격에서 벗어났을 때와 성격에 갇혀 있을 때 행동이 어떻게 달라지는지 비교해보세요."], "key_concepts": ["기본 두려움(basic fear): 각 유형이 가장 두려워하는 것", "기본 욕망(basic desire): 기본 두려움의 반대, 세트로 연결됨", "동일시(identification): 성격을 나 자신이라고 여기는 것", "성격 방어: 두려움 때문에 자동적으로 작동하는 보호 메커니즘", "어린 시절 메시지: 성격 형성에 영향을 미치는 어린 시절의 경험", "잠자고 있는 상태: 성격에 완전히 동일시되어 자동반응하는 상태", "선택권과 자유: 성격에서 벗어날수록 반응 선택권이 늘어남", "불행의 근원: 성격과의 동일시에서 비롯됨"]}, {"date": "2025-12-31", "session_num": 10, "filename": "2025. 12. 31. 오전 11_42 _ 녹음.txt", "book_chapter": "4장 (pp.55-65)", "topics_covered": ["의식(consciousness)의 정의", "의식 확장과 관찰자", "관찰하라-벗어나라", "4번 유형의 감정 패턴", "유형별 관찰 패턴"], "teacher_explanations": [{"topic": "의식의 정의 - 코마 상태가 아닌 것", "explanation": "의식이 뭐냐면, 자신을 관찰할 수 있게 해주는 상태야. 코마 상태가 아닌 거야. 코마 상태에서는 자신을 관찰할 수가 없잖아. 그러니까 의식이 있다는 게 뭐냐면 내가 지금 내 자신을 볼 수 있다는 거야. 내가 지금 어떤 상태인지, 내가 지금 어떤 감정인지, 내가 지금 어떤 생각을 하고 있는지를 볼 수 있는 상태. 그게 의식이야. 그러니까 의식이 있다는 게 단순히 깨어있다는 게 아니야. 자신을 관찰할 수 있는 능력이 있다는 거야."}, {"topic": "4번 유형의 감정이 지나간다는 핵심", "explanation": "4번 유형들한테 가장 중요한 핵심이 뭐냐면 감정은 지나간다는 거야. 4번들이 감정에 매몰되거든. 지금 이 감정이 영원히 지속될 것 같은 느낌이 드는 거야. 슬프면 영원히 슬플 것 같고, 우울하면 영원히 우울할 것 같고. 근데 그게 아니거든. 감정은 지나가거든. 파도처럼. 파도가 왔다가 가잖아. 감정도 마찬가지야. 왔다가 가는 거야. 그걸 알면 감정에 덜 매몰되는 거야. 아 이것도 지나가겠구나 하고. 그게 4번들한테 가장 중요한 연습이야."}, {"topic": "관찰하라-벗어나라 원리", "explanation": "관찰하라-벗어나라는 원리가 있어. 내가 뭔가에 빠져있을 때, 그게 감정이든 생각이든, 그냥 그걸 관찰하는 거야. 아 내가 지금 이런 감정이구나. 아 내가 지금 이런 생각을 하고 있구나. 이렇게 관찰하는 순간 거기서 벗어나기 시작해. 왜냐하면, 관찰하는 나와 관찰당하는 나가 분리되거든. 내가 감정이 아니라 감정을 바라보는 관찰자가 되는 거야. 그 순간 감정과 동일시가 끊어지는 거야. 그래서 관찰하면 벗어나게 돼. 이게 원리야."}, {"topic": "의식 확장의 의미", "explanation": "의식이 확장된다는 게 뭐냐면, 내가 볼 수 있는 영역이 넓어진다는 거야. 처음에는 내 감정밖에 못 봐. 그러다가 의식이 확장되면 내 감정도 보고, 내 생각도 보고, 다른 사람의 감정도 보고, 상황 전체를 볼 수 있게 되는 거야. 그게 의식이 확장된 상태야. 성격에 갇혀있으면 의식이 좁아져. 자기 성격의 렌즈로만 세상을 보게 되거든. 그런데 성격에서 벗어나면 의식이 넓어지면서 전체를 볼 수 있게 되는 거야."}, {"topic": "유형별 깊이있는 살펴보기", "explanation": "각 유형마다 자기 성격의 패턴을 깊이 살펴볼 수 있어야 해. 7번이라면 자기가 지금 뭔가에서 도망치고 있는 건 아닌지, 지금 뭔가를 회피하고 있는 건 아닌지를 살펴봐야 해. 그걸 살펴볼 수 있다는 게 의식이 있다는 거야. 그리고 그걸 살펴보는 순간 벗어날 수 있는 가능성이 생기는 거야. 그러니까 자기 유형의 패턴을 알고 그걸 관찰하는 연습이 중요해. 그게 애니어그램 공부의 실질적인 목적이야."}], "examples_analogies": [{"context": "", "content": "사랑과 영혼이라는 영화 알지? 거기서 주인공이 죽어서 유령이 되거든. 근데 자기가 유령인 줄 몰라. 그냥 살아있는 것처럼 살아. 그게 의식이 없는 상태야. 자기가 어떤 상태인지를 모르는 거야. 그러다가 어떤 계기로 자기가 유령이라는 걸 알게 돼. 그 순간이 의식이 생기는 거야. 그때부터 자기 상태를 볼 수 있게 되는 거야. 우리도 마찬가지야. 성격에 완전히 빠져있으면 그게 자기라고 생각해. 근데 의식이 생기면 아 이게 성격이구나를 알게 되는 거야."}, {"context": "", "content": "감정은 파도야. 파도가 왔다가 가잖아. 감정도 마찬가지야. 지금 슬프고 우울한 감정이 있어도 이게 파도처럼 왔다가 가는 거야. 파도에 올라타서 같이 이리저리 휩쓸리면 힘들지. 그런데 파도를 멀리서 관찰하면 어떻게 돼? 파도가 왔다가 가는 게 보이잖아. 감정도 그렇게 관찰하면 돼. 아 지금 이런 감정이 왔구나. 근데 이것도 지나가겠구나. 이렇게 볼 수 있게 되는 거야."}], "training_questions": ["자신이 어떤 상황에서 의식적으로 자신을 관찰하게 되는지 생각해보세요.", "최근에 강한 감정이 들었을 때 그 감정을 관찰해보려고 시도해본 적 있나요? 어떤 경험이었나요?", "자신의 유형에서 가장 자주 나타나는 성격 패턴은 무엇인가요? 그걸 관찰할 수 있었던 적이 있나요?", "관찰하라-벗어나라를 실제 삶에서 적용한다면 어떤 상황에서 연습할 수 있을까요?"], "key_concepts": ["의식(consciousness): 자신을 관찰할 수 있는 상태", "내면의 관찰자: 자신을 바라보는 또 다른 나", "관찰하라-벗어나라: 성격 패턴에서 벗어나는 실천 원리", "감정은 지나간다: 4번 유형에게 특히 중요한 핵심 진실", "의식 확장: 볼 수 있는 영역이 넓어지는 것", "동일시 해제: 감정/성격과의 동일시가 끊어지는 과정", "코마 상태: 의식 없는 상태, 자신을 관찰할 수 없는 상태"]}, {"date": "2026-01-14", "session_num": 11, "filename": "2026. 1. 14. 오전 10_46 _ 녹음.txt", "book_chapter": "4장 (pp.65-70)", "topics_covered": ["내면의 관찰자", "동일시가 의식을 쪼그라뜨림", "의식 풍선 비유", "나다움의 위험성", "유형별 동일시 패턴"], "teacher_explanations": [{"topic": "동일시가 의식을 쪼그라뜨린다", "explanation": "동일시가 의식을 쪼그라뜨려. 풍선 있지? 풍선이 크면 많이 볼 수 있잖아. 근데 풍선이 쪼그라들면 볼 수 있는 게 적어지잖아. 의식도 마찬가지야. 동일시가 강하면 강할수록 의식이 쪼그라드는 거야. 7번이 미래의 흥분된 것만 동일시하고 있으면, 7번은 그것만 보이는 거야. 다른 건 안 보이는 거야. 그러니까 동일시를 줄여야 의식이 넓어지는 거야. 내가 성격과 완전히 동일시되면 의식이 너무 좁아져서 다른 걸 볼 수가 없어."}, {"topic": "7번 유형의 동일시 패턴", "explanation": "7번들의 동일시 패턴이 뭐냐면 미래의 흥분된 것에 동일시해. 뭔가 재미있는 계획이 생기면 그 계획에 완전히 빠져들어. 그 계획이 나야. 그게 내가 될 거야. 이런 식으로 동일시가 되는 거야. 그러면 어떻게 돼? 지금 현재는 안 보여. 현재는 그냥 그 계획을 이루기 위한 과정으로만 보이는 거야. 지금 이 순간 자체가 가치 있다는 걸 못 느끼는 거야. 그러니까 7번들한테는 현재에 집중하는 연습이 중요해. 지금 이 순간도 충분히 행복할 수 있다는 걸 알아야 해."}, {"topic": "다르니까 존중해야 한다는 말의 위험성", "explanation": "다르니까 존중해야 한다는 말이 되게 위험해. 왜냐하면, 그 말이 다름을 그냥 인정하고 끝내버리기 때문이야. 근데 사실 다름을 이해하는 게 중요하거든. 저 사람이 왜 저렇게 행동하는지를 이해하면 자연스럽게 존중이 되는 거야. 이해 없이 그냥 달라서 존중한다는 건 사실 무관심이야. 이해하려는 노력 없이 그냥 다르다고만 하면 관계가 깊어질 수가 없어. 그래서 다르니까 존중한다는 말보다 달라도 이해하려고 노력한다는 게 더 맞아."}, {"topic": "2번 유형과 3번 유형의 동일시 패턴", "explanation": "2번은 타인의 반응에 동일시해. 상대방이 나를 좋아하는지 싫어하는지, 나한테 반응이 어떤지에 완전히 동일시되어 있어. 그게 2번의 동일시야. 3번은 타인의 칭찬과 자아 이미지에 동일시해. 다른 사람이 나를 어떻게 보느냐, 내가 어떤 이미지로 보이느냐에 동일시되어 있어. 6번은 지원이 부족할 때 불안해지고 의심하는 것에 동일시해. 누군가 자기를 지지해주는지 아닌지에 촉각을 세우고 있는 거야. 각 유형마다 동일시하는 포인트가 다 달라."}, {"topic": "홍성찬 본인의 관계에서 3번 특성 분석", "explanation": "나도 내 관계를 분석해봤어. 내가 관계에서 3번적인 특성을 가지고 있는 게 보여. 상대방한테 어떻게 보이는지를 신경 쓰는 거야. 내가 이 사람한테 어떤 이미지로 보이는지가 중요한 거지. 근데 그게 성격이라는 걸 알았어. 그래서 이제 그 부분을 좀 더 관찰하고 있어. 아 내가 지금 이미지 때문에 행동하고 있구나를 알아차리는 거야. 그냥 순수하게 행동하는 건지 아니면 이미지 때문에 행동하는 건지를 구분하는 게 중요해."}], "examples_analogies": [{"context": "", "content": "의식을 풍선으로 비유할 수 있어. 풍선이 크면 많이 볼 수 있어. 근데 동일시가 강해지면 풍선이 쪼그라드는 거야. 7번이 미래의 재미있는 것에만 동일시되어 있으면 풍선이 그쪽으로만 쪼그라드는 거야. 현재나 다른 것들은 안 보이게 되는 거지. 성장하면 어떻게 돼? 동일시가 줄어들면서 풍선이 다시 커지는 거야. 그러면 더 많은 걸 볼 수 있게 되는 거야. 그게 의식 확장이야."}, {"context": "", "content": "행복의 비밀이라는 유튜브 채널에서 다르니까 존중한다는 말이 세상을 망친다는 내용의 영상을 보여줬어. 그냥 다르니까 존중한다는 게 얼마나 표면적인 말인지를 설명해주는 내용이야. 진짜 존중은 다름을 이해하는 데서 오는 거야. 이해 없는 존중은 그냥 무관심이야. 그 영상을 보면 이게 얼마나 중요한 포인트인지 알 수 있어."}], "training_questions": ["자신이 가장 강하게 동일시되는 것이 무엇인지 생각해보세요. 어떤 상황에서 특히 강하게 동일시가 일어나나요?", "최근에 동일시가 강해진 상황이 있었나요? 그때 의식이 좁아진 것 같은 느낌이 있었나요?", "자신의 유형에서 동일시를 줄이려면 어떤 연습을 할 수 있을까요?", "다른 사람이 나와 다르게 행동할 때, 그냥 다르다고 생각하는 것과 왜 그렇게 행동하는지 이해하려는 것의 차이를 느껴본 적 있나요?"], "key_concepts": ["내면의 관찰자: 자신을 바라보는 의식적 자아", "동일시(identification): 특정 생각/감정/이미지를 나 자신이라고 여기는 것", "의식 풍선: 동일시가 강해질수록 의식이 좁아지는 비유", "7번의 동일시: 미래의 흥분된 계획에 동일시", "2번의 동일시: 타인의 반응에 동일시", "3번의 동일시: 타인의 칭찬과 자아이미지에 동일시", "6번의 동일시: 지원 부족 시 불안과 의심에 동일시", "이해 없는 존중의 위험성: 다름을 그냥 인정하면 관계가 깊어지지 않음"]}, {"date": "2026-01-21", "session_num": 12, "filename": "2026. 1. 21. 오후 3_12 _ 녹음.txt", "book_chapter": "4장 (pp.70-78) & 5장 시작", "topics_covered": ["현재 존재하는 것에 대한 두려움", "현존(presence)의 의미", "깨어있는 상태의 3가지 특성", "각 유형의 미덕과 비전", "트라이타입 소개"], "teacher_explanations": [{"topic": "현존(presence)의 의미", "explanation": "현존이 뭐냐면, 지금 이 순간에 완전히 있는 거야. 몸은 여기 있는데 마음은 과거나 미래에 가 있는 경우가 많잖아. 현존은 몸과 마음이 같은 곳에 있는 거야. 지금 이 순간. 그게 현존이야. 근데 그게 쉽지 않아. 왜냐하면, 사고형들은 미래로 마음이 자꾸 가고, 감정형들은 과거로 마음이 자꾸 가고, 본능형들은 지금 현재에 저항하거나 지금 현재가 마음에 안 들어서 자꾸 바꾸려고 하잖아. 세 유형 다 지금 이 순간에 완전히 있기가 어려운 거야. 그래서 현존이 중요한 훈련이야."}, {"topic": "깨어있는 상태의 3가지 특성", "explanation": "깨어있는 상태에는 3가지 특성이 있어. 첫 번째는 지금 이 순간을 있는 그대로 받아들이는 거야. 내가 원하는 대로가 아니고 지금 있는 그대로. 두 번째는 판단하지 않는 거야. 이게 좋다 나쁘다, 이게 맞다 틀리다 이런 판단 없이 그냥 있는 그대로 보는 거야. 세 번째는 자동반응을 하지 않는 거야. 어떤 자극이 왔을 때 성격대로 자동으로 반응하는 게 아니라 잠깐 멈추고 선택을 하는 거야. 이 세 가지가 깨어있는 상태의 핵심이야."}, {"topic": "7번 유형의 미덕과 비전", "explanation": "7번 유형의 미덕은 절제야. 7번이 절제한다는 게 엄청난 성장이야. 왜냐하면, 7번은 뭔가를 추구하고 자꾸 더 하려는 성격이거든. 그런데 절제를 할 수 있다는 건 그런 성격에서 많이 벗어났다는 거야. 그리고 7번의 비전은 기쁘게 존재를 축복하고 행복 나눔이야. 7번이 성장하면 자기가 행복을 경험하는 게 아니라 다른 사람이 행복해지도록 도와주는 사람이 되는 거야. 그게 7번의 성장 방향이야."}, {"topic": "트라이타입 소개", "explanation": "트라이타입이라는 게 있어. 우리가 본능 중심, 감정 중심, 사고 중심 이렇게 세 가지 중심이 있잖아. 그 세 중심에서 각각 하나씩 번호가 메인으로 쓰이는 거야. 그래서 세 개가 합쳐지는 거야. 나는 215야. 2번이 메인이고, 사고 중심에서 1번, 본능 중심에서 5번. 이렇게 세 개가 합쳐진 게 나야. 그래서 나를 215 멘토라고 부르는 거야. 신유나는 792 평화주의자야. 7번 메인, 감정 중심에서 9번, 본능 중심에서 2번. 이렇게 트라이타입이 결정되는 거야."}, {"topic": "현재 존재에 대한 두려움 극복", "explanation": "지금 여기에 있는 것에 두려움이 있어. 지금 이 순간을 충분히 느끼고 받아들이는 게 두려운 거야. 왜냐하면, 지금 이 순간에 있으면 내가 회피하고 싶었던 감정이나 상황을 직면해야 하기 때문이야. 7번이 자꾸 미래의 재미있는 것으로 도망가는 것도 지금 이 순간에 있는 게 두려워서야. 지금 이 순간에 불안하거나 불편한 감정이 있으면 그게 올라오거든. 그걸 직면하는 게 현존 훈련이야. 두려워도 지금 여기에 있는 거야."}], "examples_analogies": [{"context": "", "content": "나는 215 멘토야. 2번이 메인이고 감정 중심, 사고 중심에서 1번, 본능 중심에서 5번을 써. 그래서 멘토 역할을 자연스럽게 하게 돼. 윤아는 792 평화주의자야. 7번 메인, 감정 중심에서 9번, 본능 중심에서 2번. 평화주의자 역할이야. 평화를 원하고, 갈등을 피하고, 다른 사람을 돕고 싶어 하는 거야. 이게 윤아가 왜 그런 행동들을 하는지 이해하는 데 도움이 돼."}, {"context": "", "content": "7번이 절제를 할 수 있다는 게 성장의 증거야. 왜냐하면, 7번은 기본적으로 자꾸 더 하려고 하고 더 경험하려고 하는 성격이거든. 뭔가 좋은 게 있으면 더 먹고 싶고, 더 하고 싶고, 더 경험하고 싶고. 근데 절제한다는 건 그냥 이 정도면 충분해를 알게 됐다는 거야. 지금 이 순간에 만족할 수 있게 됐다는 거야. 그게 7번한테는 엄청난 성장이야."}], "training_questions": ["현존을 연습하려면 어떤 상황에서 시작할 수 있을까요? 하루 중 어떤 순간에 현존 연습이 가능할까요?", "깨어있는 상태의 3가지 특성 중 자신에게 가장 어려운 것이 무엇인가요?", "자신의 트라이타입을 알고 났을 때 어떤 점이 더 이해가 됐나요?", "7번 유형으로서 현재 두려움을 직면해야 할 상황이 있나요?"], "key_concepts": ["현존(presence): 몸과 마음이 지금 이 순간에 함께 있는 상태", "깨어있는 3가지 특성: 있는 그대로 받아들이기, 판단하지 않기, 자동반응 멈추기", "트라이타입: 세 중심(본능/감정/사고)에서 각각 하나씩 번호가 쓰이는 것", "215 멘토(홍성찬): 2번 메인, 사고중심 1번, 본능중심 5번", "792 평화주의자(신유나): 7번 메인, 감정중심 9번, 본능중심 2번", "7번의 미덕: 절제", "7번의 비전: 기쁘게 존재를 축복하고 행복 나눔", "현재 두려움 극복: 지금 이 순간에 있기 위해 두려움을 직면하는 과정"]}, {"date": "2026-01-30", "session_num": 13, "filename": "2026. 1. 30. 오전 11_13 _ 녹음.txt", "book_chapter": "5장 (pp.78-86)", "topics_covered": ["본능 중심(8, 9, 1번)의 키워드", "자아경계(외부/내부/혼합)", "수동적 공격성", "분노와 억압", "에너지 발산 방향"], "teacher_explanations": [{"topic": "본능 중심의 핵심 키워드", "explanation": "본능 중심의 핵심 키워드가 뭐냐면 힘, 생명력, 생존이야. 이 세 개야. 본능 유형들은 자신의 힘을 느끼고 싶어 하고, 살아있다는 생명력을 느끼고 싶어 하고, 그리고 살아남고 싶어 해. 생존하고 싶어 해. 그런데 그 방식이 각 번호마다 달라. 8번은 힘을 외부로 표현해서 그걸 느끼고, 1번은 내부적으로 옳은 것을 추구하면서 그걸 느끼고, 9번은 환경과 조화를 이루면서 그걸 느끼는 거야. 같은 키워드인데 표현 방식이 달라."}, {"topic": "8번의 자아경계와 에너지 발산", "explanation": "8번은 자아경계가 외부로 발산돼. 나와 저건 아님의 경계를 긋는데, 그 경계를 외부로 밀어내는 거야. 그래서 8번들이 강하게 자기 영역을 주장하고 다른 사람을 압도하려고 하는 거야. 자기 영역을 외부로 확장하는 거야. 그래서 8번과 부딪히면 에너지가 세게 느껴지는 거야. 이 에너지가 외부로 나오거든. 그래서 8번들이 자기 영역에 침범받으면 바로 반응하는 거야. 자기 경계가 침범당했다고 느끼니까."}, {"topic": "1번의 자아경계와 내부 억압", "explanation": "1번은 자아경계가 내부로 억압돼. 분노가 있는데 그걸 내부로 억제하는 거야. 옳고 그름이라는 기준이 있는데, 그 기준에 맞지 않는 자기 욕구나 감정을 내부에서 억제하는 거야. 그러니까 1번들이 화를 내면 엄청 오래 쌓이다가 한 번에 터지는 경우가 많아. 평소에 내부에서 자꾸 억제하다가 한계에 달하면 폭발하는 거야. 그게 1번이 내부로 에너지를 향하기 때문이야."}, {"topic": "9번의 수동적 공격성", "explanation": "9번은 자아경계가 내부 외부 양방향이야. 혼합이야. 그래서 9번은 수동적 공격성을 써. 직접 공격하지 않아. 왜냐하면, 9번은 갈등을 피하고 싶어 하거든. 근데 분노가 없는 건 아니야. 분노를 수동적으로 표현하는 거야. 예를 들면 응 응 응 해놓고 안 하는 거야. 표면적으로는 동의한 것 같은데 실제로는 안 하는 거야. 그게 수동적 공격성이야. 직접 거부하는 게 아니라 그냥 흐지부지 만들어버리는 거야. 9번의 분노 표현 방식이야."}, {"topic": "891번이 환경에 저항하는 이유", "explanation": "891번이 환경에 저항하는 이유가 있어. 지금 현재 환경이 마음에 안 들어서야. 자기가 원하는 대로 환경이 안 돼 있기 때문에 그걸 바꾸려고 하는 거야. 자치권, 통제라는 키워드가 여기서 나오는 거야. 내가 내 삶을 통제하고 싶고, 내가 원하는 대로 환경을 만들고 싶은 거야. 그래서 지금 현재 환경이 그렇지 않으면 저항하는 거야. 이게 본능 중심이 현재에 저항하는 이유야."}], "examples_analogies": [{"context": "", "content": "약국에서 8번 직원이 4번 직원이랑 싸운 케이스야. 8번이 4번한테 자꾸 뭔가를 요구하고 압박하는 거야. 8번은 외부로 에너지가 나가거든. 그래서 자기 경계를 외부로 밀어내는 거야. 근데 4번은 자기 자아이미지가 있는데 그게 침범당한다고 느끼니까 반응하는 거야. 두 유형의 자아경계가 충돌하는 거야. 8번은 에너지를 외부로 밀어내고, 4번은 자기 내면의 이미지를 지키려고 하는 거야. 그 충돌이 갈등으로 나타나는 거야."}, {"context": "", "content": "자아경계를 쉽게 이해하려면 이렇게 생각해봐. 나는 나고, 저건 나가 아니야. 이 경계를 어떻게 긋느냐가 각 유형마다 달라. 8번은 이 경계를 외부로 힘껏 밀어내는 거야. 나의 영역을 넓히려고. 1번은 이 경계를 내부에서 관리하는 거야. 내 안의 기준으로. 9번은 이 경계가 유동적이야. 상황에 따라 맞춰가면서. 이게 자아경계야."}], "training_questions": ["자신의 분노가 어떤 방식으로 표현되는지 관찰해본 적 있나요?", "9번의 수동적 공격성을 자신의 삶에서 또는 주변에서 본 적 있나요?", "8번의 에너지와 1번의 에너지가 어떻게 다른지 실제 사람을 통해 비교해볼 수 있나요?", "자신이 환경에 저항하고 싶을 때 그게 어떤 방식으로 나타나나요?"], "key_concepts": ["본능 중심 키워드: 힘, 생명력, 생존, 자치권, 통제", "자아경계: 나와 저건 아님의 경계를 어떻게 형성하느냐", "8번 자아경계: 외부 발산 - 에너지를 밖으로 밀어냄", "1번 자아경계: 내부 억압 - 에너지를 안으로 억제함", "9번 자아경계: 양방향 혼합 + 수동적 공격성", "수동적 공격성: 직접 거부하지 않고 흐지부지 만들어버리는 방식", "환경 저항: 지금 현재 환경이 마음에 안 들어서 바꾸려는 것", "891번 공통점: 현재 환경에 저항함"]}, {"date": "2026-02-04", "session_num": 14, "filename": "2026. 2. 4. 오전 11_14 _ 녹음.txt", "book_chapter": "5장 (pp.84-90) - 감정 중심", "topics_covered": ["감정 중심(2, 3, 4번)의 핵심 키워드", "감정의 고유 기능: 자아 이미지 형성, 정체성, 타인과의 관계", "나르시스적인 상처", "거짓된 정체성과 동일시", "378 유형의 감정 대체 패턴"], "teacher_explanations": [{"topic": "감정의 가장 중요한 기능 - 자아 이미지 형성과 정체성", "explanation": "감정의 기능 중에 가장 중요한 게 뭐냐면 자아 이미지 형성이야. 왜냐하면, 감정의 기능 자체가 나는 누구냐를 자꾸 관심 갖는 거거든. 결국에 나는 누구고 나는 다른 사람. 그러니까 내가 구분이 되려면 만약에 우리가 이 세상에 아무도 없어. 나 하나밖에 없어. 만약에 그랬을 때 지금 너는 이름이 신윤아잖아. 아무도 이 세상에 없는데 신윤아라는 이름을 너가 가질 필요가 있어? 없어. 왜 없어? 어차피 한 명 있는데. 구분된다라는 거는 다른 사람과 나를 구분한다는 거야. 그래서 이 감정의 기능이 왜냐면 정체성에 연관돼 있는 기능이기 때문에 그래서 이 감정의 기능은 자꾸 나는 누구냐에 관심을 갖는 게 시작이고 그러기 위해서 이름이나 행동이나 이런 걸로 나와 쟤가 다름으로써 나를 느낀다는 거예요."}, {"topic": "378 유형의 감정 대체 패턴", "explanation": "우리가 자신의 감정과 온전히 함께하지 못하기 때문에 온갖 종류의 반응들을 일으켜 진정한 느낌을 대체하거든. 8번은 온전히 못하기 때문에 자꾸 싸우고 화내려고 하는 거고, 을 버릴 사람이라고 한다."}, {"topic": "나르시스 신화 - 자아이미지의 비극", "explanation": "나르시스가 처음에 그 우물에 얼굴 이렇게 자기 얼굴 비춰보기 전에는 다른 사람들이 막 잘생겼다, 예쁘다, 멋있다. 이런 얘기만 막 들어서 자기가 그런 사람인 줄 알았던 거야. 그러니까 자아 이미지가 형성된 거지. 그런 식으로. 그래서 자기 자신을 아 난 멋지고 잘생긴 사람이구나. 난 좋은 사람이야. 이렇게 생각했는데 딱 들이댔는데 괴물이 나타난 거지. 반사된 얼굴이. 그래서 이제 놀래서 도망간 거지. 이게 이제 나르시시적인 상처라고 얘기하는 거야. 처음에는 다른 사람의 피드백으로 자아이미지를 형성해. 처음에는 그래가지고 나르시스가 그렇게 이제 사랑의 시작이자 비극의 시작인 거예요."}, {"topic": "정체성과 적대감 - 감정 중심의 두 주제", "explanation": "이들은 자신의 정체성이 진정한 자신을 표현하는 게 아니라는 것을 무의식적으로 알고 있기 때문에 자신의 정체성이 인정받지 못할 때마다 적대감을 갖고 반응한다. 이게 진짜 이거는 그냥 머릿속에 암기하고 있어. 그러니까 왜 암기해야 되냐면 내가 딱 봤는데 저 유형이 234 중에 하나인 거 같아. 감정형인 거 같아. 그런데 나한테 뭔가 적개심을 자꾸 드러내는 거 같아. 그렇다는 얘기는 무슨 얘기야? 그 사람한테. 나는 내가 그 사람한테 어떤 그 느낌을 주고 있다는 얘기야. 거꾸로 얘기하면. 그 사람의 정체성을 인정해주지 내가 않고 있다는 얘기야."}, {"topic": "변증법(정반합)과 성격의 성장", "explanation": "변증법이라는 게 있어. 변증법 뭔지 알아? 그거 처음에는 정 정이야. 정 올바를 정 정으로 시작했다가 삶을 통해서 경험을 통해서 뭔가 내 맘대로 잘 안 돼. 내 생각대로. 그러면은 반으로 가는 거야. 정해서 반으로. 그러니까 예를 들면은 나는 올바르게 사려고 했어. 그런데 내 방식대로 안 돼. 그러니까 이 세상에 대한 분노를 갑자기 살인이라든지 그런 식으로 막 이렇게 반대 완전 정과 반대 그 방식으로 뭔가를 하려고 한단 말이지. 그래서 정이 반으로 갔다가 거기서 머무르면 이제 망하는 거고, 정과 반이 이제 합의를 이뤄. 네 안에서 아 정으로만 했다가 안 되고 반으로도 했다가 안 돼요. 그러면 그 중간에 섞어서 합을 해서 중간으로 가야겠구나. 정반합. 그럼 합으로 갔어. 그러면은 그 합이 또 새로운 정이 되는 거죠."}, {"topic": "1번 유형 다루는 방법", "explanation": "옳고 그름으로 접근을 하되 그 사람은 사고가 무의식에 있으니까 사고 자체를 바로 건드려 버리면 그 사람은 감정과 그 본능이 연결돼 있는 게 대체한다. 했잖아. 사고를 바로 건들면은 분노로 나온단 말이야. 그래서 절대로 사고로 접근을 하되 너가 얘기하는 게 내가 얘기하는 게 옳고 그름이야에서만 그치면 안 되고 내가 생각한 옳고 그름은 이건데 당신이 얘기하는 옳고 그름은 사실 옳고 그름이 아니라 내 기준에서 봤을 때는 좋고 싫음이다. 니가 얘기한 건 좋고 싫음이다를 인지시켜야 돼. 그러면은 수그러들어 본인이 반성해. 왜냐하면, 알거든. 사실 자기 남은 속일 수 있어도 자기 자신은 못 속이잖아."}, {"topic": "감정 유형의 일기 쓰기 - 과거 기능 활성화", "explanation": "정체성을 찾는 거. 너만의 정체성. 그 찾는 그 기능을 너가 챙길 수가 있어야 돼. 그래서 너가 뭘로 연결이 되는 거냐면 1번이랑 연결이 되는 거예요. 그래서 과거를 돌아보는 거야. 감정의 그 시점이 과거라고 했잖아. 그러니까 783번들은 특히 일기를 쓰는 게 많이 도움이 돼요. 그런데 그냥 일기를 쓰는 게 아니고 7번 유형들이 써야 되는 일기 패턴은 뭐냐면 자기 감정에 대해서만 일기를 쓰면 성장이 막혀. 결국에 이 감정의 중요한 기능은 타인과의 관계잖아. 이게 공감, 역지사지잖아. 그런데 자기 감정에만 관심을 갖다 보니까 타인에 여전히 무감각한 거야. 그래서 타인의 감정에 대해서 관심 갖는 일기를 많이 써야 돼."}], "examples_analogies": [{"context": "", "content": "에니어그램 1번이 완전 불건강한 범위로 떨어지는 그 케이스들 중에 범죄자가 나 얘기했었나? 범죄자 중에 극악무도한 살인범 중에 에니어그램 1번들이 있어요. 그런데 그런 1번들이 하는 얘기가 뭐냐면 어떤 사람이 살인을 해서 잡힌 다음에 그 뉴스 나와가지고 하실 말씀 없냐고 했더니 걔가 당당하게 눈 똑바로 뜨고 카메라에 대서 너 다음 생에도 나 만나면 똑같이 죽어 이렇게 얘기했던 것 같아요. 그러니까 자기가 정의인 거든. 자기가 정의이고 자기 기준에서는 자기는 올바른 행동을 했다는 거거든. 그러니까 걔의 기준에선 그게 정의고 올바른 거야. 에니어그램 공부해봤으면 알잖아. 아기를 갖고 있는 사람은 없어. 그 성격이 심해지면 다른 사람 눈엔 그게 악의처럼 보이는 거지."}, {"context": "", "content": "2번 유형의 사람들은 자신을 존중하는 마음을 얻기 위해서 다른 사람들에게 친절 도움 선의를 먼저 베푼다. 야 이게 무슨 잘 봐봐. 이거 엄청난 모순된 문장이야. 이 문장이 왜 모순됐을 것 같아? 바로 그거지. 그게 모순이라는 거지. 그러니까 성격이 세면 셀수록 뭐가 자꾸 생긴다? 모순이 생긴다라는 거를 다시 한번 강조할게. 그래서 저 사람이 성장했냐 불건강하냐는 그냥 모순점이 있냐 없느냐 요걸로도 평가가 아주 쉽게 할 것 같아. 그러니까 존중하는 마음을 자신을 존중하려면은 자신을 자기가 스스로 존중하면 되잖아."}, {"context": "", "content": "4번들을 겉에서 보는 이제 다른 사람이 4번을 봤을 땐 그래서 포기를 잘한다고 생각해요. 끈기가 없다고 생각하고 그런데 4번한테 얘기를 해 이제 들어보잖아. 그러면은 자기는 완벽주의자 성격이 있다고 얘기해 꺼꾸로. 이게 되게 재밌는 거야. 왜냐? 4번하고 1번하고 또 연결돼 있잖아. 이게 그런데 마치 4번이 1번과 같은 생각을 하고 있다는 거야. 자기 완벽주의자. 그런데 1번이 봤을 때 4번은 전혀 완벽주의자는 아니거든. 왜냐? 4번이 생각하는 완벽이란 1번처럼 소처럼 꾸준히 노력해서 도달하는 게 아니라 한 번에 가서 도달하려는 거야. 그래서 안 되면 포기하는 거야."}], "training_questions": ["당신이 다른 사람에게 거부당했다고 느꼈을 때 어떤 감정이 올라왔나요? 그게 수치심과 연결되어 있나요?", "감정 중심 유형의 사람이 당신에게 적대감을 드러낸 적 있나요? 그때 그 사람의 정체성을 어떤 면에서 인정해주지 않았을 가능성이 있나요?", "2번이 자신을 존중하기 위해 타인에게 베푼다는 모순을 어떻게 극복할 수 있을까요?", "변증법의 정반합 중 자신의 삶에서 현재 어느 단계에 있는 것 같나요?", "7번으로서 타인의 감정에 집중하는 일기를 써본다면 어떤 점이 달라질 것 같나요?"], "key_concepts": ["수치심(shame): 감정 중심 유형의 핵심 감정, 거부당할 때 내가 잘못이 있다고 느끼는 것", "나르시스적 상처: 자기 이미지를 사랑하다 결점을 발견하는 비극", "감정 중심의 두 주제: 정체성(나는 누구인가)과 적대감(정체성이 인정받지 못할 때 나타남)", "2번의 해결책: 타인을 기쁘게 해서 사랑받으려 함", "3번의 해결책: 성취를 통해 가치 있는 사람이 되려 함", "4번의 해결책: 특별한 이야기를 가진 독특한 존재로 인정받으려 함", "변증법(정반합): 정→반→합의 성장 과정", "모순점 발견: 성격이 강할수록 행동에 모순이 생김", "1번과 234의 연결: 결점 없는 완벽함을 추구하는 공통 요소", "7번의 일기 쓰기: 자기 감정이 아닌 타인의 감정에 집중해야 성장"]}, {"date": "2026-02-20", "session_num": 16, "filename": "2026. 2. 20. 오전 11_54 _ 녹음.txt", "book_chapter": "5장 (pp.88-90) - 사고 중심 & 본질 표", "topics_covered": ["사고 중심(5, 6, 7번)의 핵심 키워드", "고요한 마음과 내면의 안내", "5번/6번/7번의 두려움 반응 패턴", "본능/감정/사고 중심의 본질 표", "이론을 알아야 성장 가능한 이유"], "teacher_explanations": [{"topic": "이론을 알아야 성장이 가능한 이유", "explanation": "공부를 해야지 잘 알아. 그래서 공부를 좀 같이 조금씩 하고 있어. 내가 이런 식으로 좀 깊이 알려주고 있을 때 왜냐면, 모른 상태에서 너처럼 감각만 있는 거야. 사실 이론을 모르는. 그런데 이론을 모르면 성장할 수가 없어요. 사실 절대 성장이 안 돼. 왜냐면은 어떤 거를 내가 탁 느끼는 그 순간에 아 이게 그 이론에서 말한 이거구나를 매칭이 바로 돼야지 이게 인지가 돼서 통제가 되거든. 그런데 근거 없이 감각만 쓰면 이게 뭐 성장의 그 포인트인지 이론인지 아닌지 모른단 말이야. 그렇기 때문에 성장이 안 되고 사실상 그래서 이론화를 정확하게 성장이 가능한 거야."}, {"topic": "고요한 마음 - 사고 중심의 본질", "explanation": "고요한 마음은 우리에게 현실을 있는 그대로 지각하는 능력을 주는 내면 안내의 원천이다. 야 이거 진짜 미쳤다. 이거는 밑줄을 한 5개를 쳐놔야 돼. 진짜. 이건 진짜 미친 말이야. 여기서 가장 중요한 키워드가 뭐야? 이 문장에서. 현실을 있는 그대로. 바로 그거지. 그러니까 이 사고 유형들은 항상 불안을 느끼다 보니까 뭐가 자꾸 연결성을 잃어가는 거야? 자꾸 그걸. 그래서 내가 저번에도 얘기했지만, 결국 감정형, 사고형 다 결국에 어디로 귀결된다? 본 현재로 연결이 결국에는 가야 된다는 거지. 고요한 마음이 없다는 얘기야. 자꾸 불안하기만 하고 그러니까 현실에서 자꾸 떠나 있다는 얘기고 고요한 마음은 우리의 행동을 안내해주는 내면으로부터 소리를 지각할 수 있게 해준다. 고요해야 듣는다는 얘기야. 내면의 소리를."}, {"topic": "5번 유형의 두려움 반응 패턴", "explanation": "5번 유형은 삶으로부터 움츠러들고 자신의 개인적인 필요를 줄임으로써 반응을 한다. 그래서 5번 유형들은 자신들이 너무 약하고 충분하지 못한 사람이기 때문에 세상에서 안전하게 생존하기 어렵다고 기본적으로 이렇게 생각한다는 거. 기본적으로. 그래서 유일하게 안전한 장소는 자기의 마음 속이다. 진짜 맞는 말이야. 그래서 이들은 세상에 뛰어들 준비가 되었다고 느낄 때까지 생존하게끔 도와준다고 믿는 것은 무엇이든 비축한다. 여기 써 있지. 그래서 자꾸 저장하고 수집하는 거다. 5번 유형들을. 그래서 5번 유형들이 의사가 많은 이유, 치과의사가 많은 이유가 어떤 기술이나 자질을 완전히 익혀서 그것이 자신을 안전하게 해줄 거라는 확신이 들 때까지 움츠리고 있기 때문이야."}, {"topic": "6번 유형의 역설 - 독립을 위해 의존하게 됨", "explanation": "그래서 이들은 독립적이기 되기 위해 지원을 구한다. 그런데 아이러니하게도 그 독립성을 얻기 위해서 자신들이 이용한 사람이나 체제에 의존하게 된다. 이게 중요한 포인트야. 그러니까 독립을 하고 싶어. 그러니까 기본적으로 6번들은 자기 스스로 떳떳하고 싶고 자기 자신 자체로 그냥 자신 있는 사람이 되고 싶어 하거든. 자신감 있는 사람. 그런데 그렇게 하기 위해서 조언을 자꾸 구하거든. 그러다 보니까 오히려 점점 거기에 얽매게 돼서 자신감 있고 독립적인 사람이 못 되는 거야. 결국에는 그냥 자기가 그냥 조언은 참고만 하고 그냥 현실에 부딪치고 경험하고 하면서 나만의 데이터와 경험을 축적하면 자신감 있는 사람이 되고 독립적인 사람이 될 수 있거든."}, {"topic": "7번 유형의 두려움 - 내면에 대한 두려움", "explanation": "7번 유형들은 두려움으로 가득 차 있다. 그런데 그 두려움이 어디냐? 바깥 세상이 아니고 내면에 대한 두려움을 갖고 있기 때문이다. 내면에 그래서 감정적인 고통 슬픔 특히 불안감에 사로잡히는 것을 두려워해서 자꾸 거기서 벗어나려고 외향적인 활동을 통해서 잊으려 한다는 거지. 가만히 있으면은 고요하면은 자꾸 이런 감정적인 고통, 슬픈 불안감이 갑자기 떠오르니까 그게 싫어서 도망가는 거고. 7번 유형들은 내재된 불안과 상처 표면으로 떠오르지 않도록 무의식적으로 마음을 어딘가에 묶어두려고 한다. 그러면은 너가 알았잖아. 7번 유형이 이렇다는 거. 그러면은 너가 그때처럼 뭔가 미래에 대한 그런 뭔가 행복한 계획이 있을 때 그 계획이 도달하는 그 과정 중에 계속 행복했다는 얘기는 너가 뭘 동시에 같이 인지하면 좋을 것 같아요. 그러면 현재 현재 그러니까 한마디로 얘기하면 너가 뭔가 그런 게 없다면은 떠오를 만한 뭔가 불안인 거지."}, {"topic": "본질 표 - 본능/감정/사고 중심의 본질과 성격 대체", "explanation": "사고 중심부터 보면은 567번들은 이제 본질은 고요한 마음. 이게 가장 중요하다고 했지. 왜냐? 마음이 고요해야 알게 된다. 사실 그리고 통찰을 얻게 된다. 그다음 명확성, 지원과 꾸준함, 현재 순간에 열려 있음, 현존. 이런 것들이 사실 사고 중심의 본질이야. 그런데 이 본질에 맞닿아 있지 않고 자꾸 거기에서 이제 얻지 못하면은 이제 성격이 그거를 대체하는데 고요한 마음을 시끄러운 마음이 대체해버리고 내면의 안내 대신에 자꾸 따져보고 전략, 의심. 이런 거 많이 하고. 감정 중심의 본질은 진실. 진짜 진실해야 돼. 그다음에 사랑, 용서와 흘려보내기, 내면으로 향해 있음, 현존. 본능 중심 보면은 본질은 삶과 연결되어 있다. 이완되어 있고 열려 있고 내면에 힘이 있고 안정되어 있고 수용과 현존. 세 중심 다 현존이 있지."}], "examples_analogies": [{"context": "", "content": "내가 유료 상담, 애니어그램 포함해서 한 상담 때도 사고형들이 와요. 이번에도 학생 중에 6WO가 있었어. 그런데 걔한테도 아 너 6WO구나 해서 내가 너 걔는 치대를 가고 싶어서 준비를 하던 애였거든. 너 왜 치대 가고 싶은지 내가 맞춰볼까? 해가지고 맞췄는데 바로 맞춰. 자 맞춰봐. 어떤 6WO 아니 5번 유형의 사람이 치대를 가고 싶대. 의사가 되고 싶대. 왜 가고 싶어 하겠어? 어떤 기술이나 자질을 완전히 익혀서 어떤 전문 분야가 되면은 안전하게 해줄 거다. 그 자체가. 그러니까 치과의사라는 뭔가 그런 전문직이 주는 그런 안전함. 그러니까 이 지식대로만 하면 돼. 이게 이게 필요한 거야."}, {"context": "", "content": "그래서 특히 이제 5번 유형들이 주변에 좀 많아가지고. 지식은 그런 식으로 해서 얻을 수 있지만 통찰 못 얻거든. 그러니까 지식만 계속 쌓다 보니까 엄마가 더 불안한 거야. 사실 왜냐? 몰랐으면 안 불안했는데 알게 되니까 불안하거든. 또 그런 게 있지. 그래서 모르는 게 약이다라고 이제 하는 말도 이제 5번 유형한테는 되게 좋은 데는 이제 말이기도 하지. 엄마가 유튜브 보고서 쓸데없는 거 싫어하고 막 그렇게 하는 거야. 자꾸. 내면의 지혜와 안내는 고요한 마음 중에 일어나며 우리에게 세상에서 행동할 수 있는 자신감을 준다. 이 사고 유형들 특히 5번 유형들 이거를 반드시 기억해야 돼. 내면의 지혜와 안내가 부족해서 수집도 하고 뭐 전문가 찾아가고 뭐 책만 읽고 막 이러지만 사실 그거보다 더 중요한 게 뭐다? 고요한 마음을 갖는 거."}, {"context": "", "content": "7번 유형들은 내재된 불안과 상처 표면으로 떠오르지 않도록 이거를 어딘가에 묶어두려고 한다. 이게 하 이거는 다음 시간에 이어서 좀 얘기해 줘야 하겠어. 이게 운이 좋으면은 진짜 그래서 이런 식으로 해가지고 정말로 나에게 조력을 해주고 정말 중요한 사람을 만나게 될 수도 있어. 그런데 거꾸로 사기꾼을 만나게 될 수도 있어. 그래가지고 그래서 되게 조심해야 돼요. 7번이. 왜냐하면, 결국에 7번 유형들은 깊이 생각하거나 그런 사고하는 거를 귀찮아하거든. 결과를 빨리 보고 싶어 하거든. 빠른 행복을 얻고 싶어 해서 그런 거든. 결국엔 그러다 보니까 겉으로 보이는 걸 자꾸 그냥 믿어버리니까 사기꾼 만날 가능성이 높아진 건 사실상."}], "training_questions": ["이론을 알고 자신의 행동을 인지한 경험이 있나요? 그때 어떤 변화가 있었나요?", "사고 중심 유형의 본질인 고요한 마음을 얻기 위해 자신이 할 수 있는 실천은 무엇인가요?", "5번 유형처럼 지식을 많이 쌓아도 불안이 줄지 않는 경험이 있나요? 왜 그랬을까요?", "6번이 독립하려고 조언을 구하다가 더 의존적이 되는 역설을 자신의 삶에서도 발견할 수 있나요?", "7번으로서 내면의 불안을 외부 활동으로 피하는 패턴을 인식한 경험이 있나요? 그 이면에 있는 불안이 무엇인지 생각해보세요."], "key_concepts": ["사고 중심의 핵심 감정: 불안", "고요한 마음: 사고 중심의 본질 - 현실을 있는 그대로 지각하는 능력의 원천", "5번의 두려움 반응: 움츠러들기, 비축하기, 수집하기", "6번의 두려움 반응: 권위/지원 찾기, 그러나 역설적으로 의존 심화", "7번의 두려움 반응: 내면의 두려움 피해 외부 활동으로 도망치기", "본질 표: 사고(고요한 마음/현존), 감정(진실/사랑/용서), 본능(연결/이완/수용/현존)", "세 중심의 공통 본질: 현존(presence)", "이론 없이 성장 불가: 감각만으로는 인지-통제가 안 됨", "5번의 역설: 지식이 많아질수록 불안이 줄지 않음 - 고요한 마음이 더 중요", "6번의 역설: 독립을 위해 의존 구조에 빠짐"]}, {"date": "2026-02-27", "session_num": 17, "filename": "2026. 2. 27. 오후 1_03 _ 녹음.txt", "book_chapter": "Chapter 5 - 호니비언 그룹 (Hornevian Groups)", "topics_covered": ["호니비언 그룹 개념", "의식의 바다 은유", "공격형(assertive) 3·7·8번", "분열방향 발판 기능", "6번 그룹 미래 회피"], "teacher_explanations": [{"topic": "호니비언 그룹의 핵심 원리 - 겉모습과 내면 동기의 차이", "explanation": "중심이 같기 때문에 행동의 내면의 동기는 똑같은 거야. 겉으로 보이는 건 달라도 겉으로 보이는 게 다르고 내면의 동기는 똑같다. 그런데 이제 호니비어는 뭐다? 겉으로 보이는 게 똑같아. 비슷해. 그런데 내면의 동기는 다른 거야. 그러니까 이게 왜 구분돼서 알아야 되냐면 똑같은 비슷한 행동을 해도 이게 이걸 잘 모르고 인제 사람들을 보면은 나랑 비슷하니까 나랑 같은 생각을 하겠지라고 생각하는데 그게 아니라는 거예요. 그래서 처음에 이것도 이제 내가 이런 걸 알게 된 다음에 이제 연인이나 커플 부부 이런 것 이런 케이스를 조금 놓고 이제 분석을 해보니까 보통 그래서 이제 연인이 되거나 이렇게 이제 처음에 관계가 형성이 될 때 친구 관계도 그렇고 보통 어떻게 형성이 보통 많이 되는 공통점이 있었냐면 이렇게 호니비언 그룹끼리 친해지는 경향이 있어 처음에는 쉽게 왜냐면은 겉으로 보이는 게 비슷하니까. 그런데 친해지는 건 빨리 친해져. 너 어떻게 된다? 또 멀어지기도 해. 아예 관계가 끊어지거나 왜냐? 가까이 지내서 보다 보니까 알게 되는 거죠. 아 실제 그 속마음은 나랑은 다른 거였구나."}, {"topic": "의식의 바다 은유 - 수면 위치와 긍정/부정 의식", "explanation": "이 원이 뭔가 예를 들면 이런 거지. 살짝 다시 설명을 해주면은 그래서 이 화면을 보면 이게 원이면 의식의 바다라는 거는 이렇게 돼 있는 거지 사실상. 이렇게 이게 바다인 거지 사실. 이렇게 이렇게 그래서 이제 여기가 이제 바다고 그다음에 이 바다 위에 이제 해가 있는 거지 태양 선이 있는 거지. 그래서 빛이 과다 밑으로 쭉 들어오잖아. 그러면은 수면에 가까운 요쪽 위쪽 수면에 가까울수록 빛이 강하게 들어오기 때문에 이 9번 유형, 이 2번 유형, 이 7번 유형 수면 위에 가까운 유형은 그래서 긍정적인 사고와 긍정적인 면을 크게 바라본다. 이렇게 얘기를 해줬었지. 그런데 이제 이런 관점에서 봤을 때 해가 빛이 수심에 깊이 도달할수록 빛이 잘 안 도달하지 그래서 바다 밑  날개 쪽 특징이 더 많이 나오거든. 처음에는 주성격 특징이 더 드러나고."}, {"topic": "8W7과 8W9의 차이 - 날개에 따라 전혀 다른 모습", "explanation": "그래서 8번이면은 딱 그 쎄한 느낌이 있어요. 다른 사람한테 별로 관심 없는 그 쎄한 느낌. 그런데 9W8은 그러지는 않아요. 그래도 조금 좀 후랜들이. 그래서 9W8은 좀 8번스럽기도 해서 약간 좀 8번인가 싶기도 한데 실제로는 좀 유하고 결정적으로 추진력이 약해 왜냐면은 8번 날개가 진행시켜 봐 한번 도전해 봐 이렇게 조언을 해주는데 본체는 9번이잖아. 그래서 그 결정적일 때 딱 결정해야 될 때는 멈칫하거나 아니면 결정을 조금 낮게 쓴다거나 조금 자신 없이 약간 그렇게 하는 게. 그런데 내가 봤을 때 그런 느낌은 9W8이 맞고 8번이면 말이 짧고 그다음에 대답을 잘 안 할 수도 있어. 사람들이 말 걸어서. 그러면 9번일 가능성이 높지. 9W8은 좀 8번스럽기도 해서 약간 좀 8번인가 싶기도 한데 실제로는 좀 유하고."}, {"topic": "8번 유형이 변호사 많은 이유 - 정의와 울타리 안 사람", "explanation": "8번들이 변호사도 많이 하는 게 8번들이 정의 이런 그 정의 구현 이런 것들에 어 그런 게. 그런데 사실 다 주관적이지. 이제 감정 감정 중심적인 그래서 이제 그게 8번들의 한계이기도 하죠. 이제 그러니까 자기 울타리 안에가 정의인 거야. 사실 8번들한테는 객관적인 정의가. 그래서 8번들은 원피스를 좋아하는 게 만화 원피스 만화가 다 해적 그렇게 해 가지고 해군이 정의 이런 쪽 그러니까 불의와 정의와 싸움 이런 거 이런 것들을 되게 끌려하고 좋아하는 게 8번들이야. 그래가지고 그런데 사실 다 주관적이지. 이제 감정 감정 중심적인."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["같은 9번이라도 9W1과 9W8이 실제 행동에서 어떻게 다르게 나타나나요?", "8번과 9W8을 구분하는 현장에서의 핵심 포인트는 무엇인가?", "트라이타입이 날개 이론과 다른 점은 무엇이며 왜 더 정확한가?"], "key_concepts": ["날개 이론: 주성격이 추구하는 방향을 위해 양옆 번호(날개)가 조언하는 역할", "날개는 주성격처럼 보이기도 함 - 첫인상이 주성격이고 가까워질수록 날개 특징 드러남", "트라이타입: 본능·사고·감정 세 중심에서 각각 하나씩 가지는 유형 조합", "9W8: 유하지만 선 넘으면 집요한 복수심 / 결정적 순간에 멈칫하는 특징", "8번: 울타리 안 사람만 챙기고 주관적 정의감 / 원피스처럼 불의와 싸우는 서사에 끌림", "8W7(마초, 거침) vs 8W9(덜 거침, 조금 더 friendly)의 날개 차이", "9번은 갈등 회피 장치를 미리 만들어 두는 특징 - 소송 넘기기, 보험처리 등", "날개가 강하게 나타날수록 주성격과 날개를 혼동하기 쉬움"]}, {"date": "2026-03-20", "session_num": 21, "filename": "2026. 3. 20. 오후 1_09 _ 녹음.txt", "book_chapter": "Chapter 6 - 발달 수준 (Levels of Development)", "topics_covered": ["발달 수준 1-9단계", "원통 은유", "일깨우는 신호", "무게 중심", "납의 원칙", "자기 평가의 왜곡"], "teacher_explanations": [{"topic": "발달 수준의 원통 은유 - 낮은 단계에서는 모든 유형이 비슷해 보임", "explanation": "발달 수준을 설명할 때 원통(cylinder) 모양으로 이해하면 돼. 이 원통의 위쪽이 발달 수준이 높은 거고 아래쪽이 낮은 거야. 그런데 이 원통을 위에서 내려다보면 다 다르게 보여. 각각의 유형이 다 달라 보이지. 그런데 이 원통을 밑에서 올려다보면 어때? 다 비슷하게 보여. 거의 같아 보이지. 그러니까 발달 수준이 낮을수록 9가지 유형이 다 비슷해 보인다는 거야. 어두워지고. 모든 유형이 다 병적으로 보이는 거야. 최하단에 가면은. 그래서 발달 수준이라는 거는 1이 가장 건강하고 9가 가장 병적인 거야. 그래서 1단계에 가까울수록 건강하고 성장한 거고 9단계에 가까울수록 미성숙하고 병적인 상태인 거지."}, {"topic": "발달 수준은 고정이 아님 - 왔다 갔다 하는 특성", "explanation": "발달 수준이라는 게 고정이 아니야. 사람이 계속 왔다 갔다 해요. 오늘은 3단계에 있다가 내일은 5단계로 갈 수도 있고 또 다시 2단계로 올라갈 수도 있어. 이렇게 계속 움직이는 거야. 그런데 중요한 건 뭐냐면 내가 평균적으로 어느 단계에 있느냐. 그게 내 무게 중심이야. 무게 중심(center of gravity)이라고 표현하는데 이 무게 중심은 굉장히 천천히 변해. 왜냐하면, 정말 큰 삶의 사건이 있거나 아니면 오랜 시간 동안 꾸준히 노력을 해야지 무게 중심이 올라가거든. 쉽게 올라가지 않아. 그래서 우리가 이론을 알고 노력하는 것도 중요하지만 그게 실제로 무게 중심을 바꾸는 데는 시간이 걸린다는 거야."}, {"topic": "일깨우는 신호 - 건강 범위에서 평균 범위로 내려갈 때의 경고", "explanation": "일깨우는 신호라는 게 뭐냐면 내가 건강한 범위에서 평균적인 범위로 내려갈 때 그게 경고 신호가 나온다는 거야. 예를 들면 7번의 일깨우는 신호가 뭐냐면 어딘가 더 나은 것이 있다라는 생각이 드는 거야. 이게 일깨우는 신호야 7번한테. 그러니까 지금 있는 것에 만족하지 못하고 자꾸 다른 데서 더 좋은 게 있을 것 같은 그런 생각이 들기 시작하면 그게 내가 지금 건강한 범위에서 내려가고 있다는 신호라는 거지. 그래서 일깨우는 신호를 알아야 내가 언제 내려가고 있는지를 알 수 있어. 그래서 그 신호가 오면 의식적으로 다시 건강한 범위로 올라가려는 노력을 해야 돼."}, {"topic": "자기 평가의 왜곡 - 실제보다 높은 단계에 있다고 생각하는 경향", "explanation": "진정으로 변화하고자 한다면, 우리가 자신의 실제 있는 수준보다 더 높은 곳에 있다고 생각하는 경향이 있다. 이게 굉장히 중요한 얘기야. 그러니까 내가 실제로는 5단계에 있는데 나는 3단계에 있다고 생각하는 경향이 있다는 거야. 왜 그런가? 왜냐하면 우리가 이제까지 공부한 내용들을 알고 있거든. 그런데 알고 있다는 것 자체가 이미 성장했다고 착각하는 거지. 안다는 게 실천하는 게 아닌데. 그래서 이게 함정이야. 나 이제 알았으니까 됐지 이렇게 하면 안 된다는 거야. 알았다고 해서 바뀐 게 아니거든. 실제로 행동이 바뀌고 삶이 바뀌어야 진짜 발달 수준이 올라간 거야."}, {"topic": "납의 원칙 - 각 유형이 자신의 두려움에 기반해 타인을 끌어내리는 방식", "explanation": "납의 원칙이라는 게 뭐냐면 각 유형들이 자기가 가장 두려워하는 게 있잖아. 그 두려움에 기반해서 다른 사람에게 영향을 미친다는 거야. 그러니까 예를 들면 7번 유형이 납의 원칙은 뭐냐면 다른 사람한테 고통을 주거나 다른 사람이 갖고 있는 것을 빼앗아 버린다는 거야. 그러니까 7번은 자기가 고통스러운 게 싫잖아. 그래서 자기가 그 고통을 피하기 위해서 무의식적으로 다른 사람한테 그 고통을 전가해버리거나 다른 사람의 것을 빼앗아버리는 행동을 한다는 거야. 이게 납의 원칙이야. 2번의 납의 원칙은 뭐냐면 다른 사람을 의존적으로 만들어버린다는 거야. 자기한테. 그래서 이게 의식적이든 무의식적이든 이런 패턴이 나타난다는 거고, 황금의 원칙은 이 납의 원칙의 반대 방향이야. 상대방의 자유와 성장을 도와주는 거지."}, {"topic": "처형(7번) 난방비 30만원 사례 - 7번의 납의 원칙", "explanation": "내 처형 얘기를 하자면 처형이 7번이거든. 그런데 처형이 어떻게 하냐면 우리 어머니 댁에 갔을 때 그 난방비가 30만 원이 나왔어. 근데 처형이 그걸 어떻게 했냐면 난방비를 우리 어머니한테 왜 이렇게 많이 나왔냐고 뭐라 한 거야. 그러면서 이게 낭비다 이렇게 한 거야. 그런데 사실 처형 집에서는 그렇게 해도 되지만 어머니 댁에서는 어머니가 추위를 많이 타시거든. 그런데 그 어머니가 추위 타시는 거를 무시하고 자기 기준에서 이건 낭비다라고 판단해버린 거지. 그게 7번의 납의 원칙이야. 다른 사람의 것을 빼앗아버리는 거. 어머니한테서 따뜻하게 지낼 권리를 빼앗아버린 거야. 이게 납의 원칙이야."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["발달 수준의 무게 중심이 왜 천천히 변하는지, 그리고 어떤 경우에 변하는지 설명해보세요.", "7번의 일깨우는 신호와 그 의미를 설명하고 실생활 예시를 들어보세요.", "납의 원칙과 황금의 원칙의 차이를 설명하고 각 유형별 납의 원칙 예시를 말해보세요."], "key_concepts": ["발달 수준 1-9: 1이 가장 건강(통합), 9가 가장 병적(분열) - 고정이 아닌 유동적", "원통 은유: 높은 단계에서는 유형별로 달라 보이고, 낮은 단계에서는 모든 유형이 비슷하게 보임", "무게 중심(center of gravity): 평균적으로 머무는 발달 단계 - 매우 천천히 변함", "일깨우는 신호: 건강 → 평균 범위로 내려갈 때 나오는 경고 신호 (7번: 더 나은 것이 있다는 생각)", "위험신호: 평균 → 불건강 범위로 내려갈 때의 경고", "자기 평가의 왜곡: 실제보다 높은 단계에 있다고 착각하는 경향", "납의 원칙(Lead Principle): 각 유형이 두려움 기반으로 타인을 끌어내리는 방식", "황금의 원칙(Golden Principle): 납의 반대 - 타인의 자유와 성장 지원"]}, {"date": "2026-04-03", "session_num": 22, "filename": "2026. 4. 3. 오후 12_51 _ 녹음.txt", "book_chapter": "Chapter 6 - 위험신호, 쇼크포인트, 비통합/통합 방향", "topics_covered": ["위험신호(danger signals)", "쇼크포인트", "불건강한 범위", "비통합 방향의 발판 기능 심화", "황금의 원칙", "애니어그램 vs MBTI"], "teacher_explanations": [{"topic": "위험신호(danger signal) - 평균에서 불건강 범위로 내려갈 때의 경고", "explanation": "위험신호라는 게 뭐냐면 일깨우는 신호보다 한 단계 더 내려간 거야. 그러니까 평균 범위에서 불건강한 범위로 넘어갈 때의 신호인 거야. 7번의 위험신호가 뭐냐면 자신의 행동이 스스로에게 고통과 불행을 가져올 것이라는 두려움이야. 그러니까 7번이 불건강 범위에 가면 실제로 이 두려움이 현실이 된다는 거야. 그래서 위험신호가 느껴질 때 어떻게 해야 되냐면 의식적으로 멈추고 지금 내가 어디에 있는지를 파악하고 다시 건강한 방향으로 가려는 노력을 해야 돼. 그런데 그게 쉽지 않아. 왜냐면 불건강한 범위에 들어가면 성격에 너무 갇혀버려서 벗어나고 싶어도 방법을 모르니까 벗어날 수 없는 거야. 그래서 성격이 갇혀있으면 벗어나고 싶어도 방법을 모르니까 벗어날 수 없다라는 거지."}, {"topic": "쇼크포인트 - 레벨 6과 7 사이의 경계", "explanation": "쇼크포인트라는 게 있어요. 이게 뭐냐면 레벨 6과 레벨 7 사이에 있는 경계선이야. 그래서 이 쇼크포인트를 넘어가면 불건강한 범위로 들어가는 거야. 그런데 이 쇼크포인트를 넘어가려면 추가적인 충격이 있어야 돼. 그러니까 그냥 자연스럽게 내려가는 게 아니라 뭔가 큰 충격이나 사건이 있어야 이 쇼크포인트를 넘어간다는 거야. 그래서 불건강한 범위에 들어간 사람들을 보면 대부분 뭔가 큰 사건이 있었거나 엄청난 스트레스가 누적됐거나 이런 경우들이야. 그냥 갑자기 내려가는 게 아니라는 거지. 그래서 이 쇼크포인트가 중요한 이유가 이게 마지막 보호막 역할을 한다는 거야."}, {"topic": "불건강 범위 = 자기방치 - 성격에 갇혀 벗어나는 방법을 모름", "explanation": "불건강한 범위가 뭐냐면 자기방치야. 자기방치. 자기 자신을 스스로 돌보지 않는 거지. 그러니까 성격이 갇혀있으면 벗어나고 싶어도 방법을 모르니까 벗어날 수 없다는 거야. 이게 불건강한 범위의 핵심이야. 그래서 이 불건강한 범위에 있는 사람들은 도움이 필요해. 혼자서는 벗어나기가 굉장히 어려워. 왜냐면 성격에 완전히 갇혀버려서 그 성격의 패턴만 계속 반복하거든. 그래서 전문적인 도움이 필요하거나 아니면 정말 큰 각성의 계기가 필요한 거야. 그리고 불건강한 범위가 자기방치라는 거는 결국에 자기 자신에 대한 책임을 포기한 상태라는 거야. 그게 가장 심각한 거지."}, {"topic": "비통합 방향의 발판 기능 심화 - 선생님의 독창적 해석과 하나님의 광야", "explanation": "비통합 방향 이론에 대해서 선생님이 책에 없는 해석을 하나 가지고 있어. 그게 뭐냐면 비통합 방향이 단순히 나쁜 방향으로 가는 게 아니라 발판이라는 거야. 그러니까 빔틀을 딱 뛸 때 발판처럼. 뛰기 위해서 발판을 밟잖아. 그 발판이 비통합 방향이라는 거야. 그래서 비통합 방향으로 먼저 가는 경험을 해야지 그 경험을 통해서 통합 방향으로 크게 도약할 수 있다는 거야. 이게 하나님의 광야와도 연결이 돼. 하나님이 우리한테 뭔가 용기를 주시는 게 아니라 용기를 낼 기회를 주신다는 거잖아. 마찬가지로 비통합 방향이 우리한테 성장할 기회를 준다는 거야. 그게 그 광야 경험이야. 광야 경험을 해봐야 진짜 성장을 할 수 있다는 거지. 근데 이게 아무도 이렇게 얘기하는 사람이 없어. 책에도 없고. 선생님이 경험에서 나온 거야."}, {"topic": "애니어그램이 주류 심리학이 되지 못하는 이유", "explanation": "애니어그램이 왜 주류 심리학으로 인정받지 못하냐면 이게 이론과 경험이 동시에 필요하기 때문이야. 이론만 알아서도 안 되고 경험만 있어서도 안 돼. 이 둘이 합쳐져야지 제대로 이해하고 적용할 수 있거든. 그런데 이걸 다른 사람한테 설명하려면 한 사람당 3-4시간이 필요해. 왜냐면 이 복잡한 구조를 이해시키려면 그만큼 시간이 걸리거든. 그래서 대중화하기가 쉽지 않아. 그리고 MBTI는 내가 이런 사람이야라고 정의만 내리고 끝나지만 애니어그램은 왜 그런지를 설명하고 어떻게 성장해야 하는지까지 알려주기 때문에 훨씬 깊어. 그래서 배우기 어렵고 가르치기도 어려운 거야."}, {"topic": "세무사 비교 사례 - 능력 있는 상담가의 차이", "explanation": "부가세 환급 얘기를 하자면 내가 세무사한테 부가세 환급을 맡겼는데 어떤 세무사는 40만원 환급받았어. 그런데 다른 세무사는 80만원을 환급받아줬어. 같은 서류를 가지고 갔는데 결과가 완전히 다른 거야. 그게 왜 그러냐면 실력 차이야. 능력 있는 세무사는 같은 서류에서도 더 많은 것을 찾아낼 수 있는 거야. 애니어그램 상담도 마찬가지야. 표면적으로만 알고 있는 사람이랑 깊이 알고 있는 사람이 내리는 상담의 질이 완전히 다른 거야. 그래서 제대로 알아야 한다는 거지. 그냥 유형 알려주고 끝내는 게 아니라 왜 그런지 원리부터 제대로 설명해줄 수 있어야 진짜 상담이 되는 거야."}], "examples_analogies": [{"context": "", "content": ""}, {"context": "", "content": ""}, {"context": "", "content": ""}], "training_questions": ["쇼크포인트가 무엇이며 이를 넘어가려면 어떤 조건이 필요한가?", "비통합 방향이 왜 단순히 나쁜 게 아니라 발판이라고 하는지 설명해보세요.", "7번의 위험신호는 무엇이고 불건강 범위에서 어떻게 현실화되는가?"], "key_concepts": ["위험신호(danger signal): 평균 → 불건강 범위로 내려갈 때의 경고",
