  { label: "서문 · 제1장 에니어그램이란", sessions: [1,2] },
  { label: "제2장 9가지 유형", sessions: [3,4,5,6,7,8] },
  { label: "제4장 성격과 동일시", sessions: [9,10,11,12] },
  { label: "제5장 3가지 지성의 중심", sessions: [13,14,15,16] },
  { label: "제5장 변형들 (그룹 분류)", sessions: [17,19] },
  { label: "제6장 에니어그램의 변형들", sessions: [20,21,22,23] },
  { label: "★ 특별 외부 상담", sessions: [18] },
];

let curSession = null, curTab = 0;
let done = JSON.parse(localStorage.getItem('enn_done') || '[]');

function byId(id){ return SESSIONS.find(s=>s.session_num===id); }

// Compute totals
let totExp=0,totEx=0,totQ=0;
SESSIONS.forEach(s=>{
  totExp+=(s.teacher_explanations||[]).length;
  totEx+=(s.examples_analogies||[]).length;
  totQ+=(s.training_questions||[]).length;
});
document.getElementById('s-exp').textContent=totExp;
document.getElementById('s-ex').textContent=totEx;
document.getElementById('s-q').textContent=totQ;

// Build nav
function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const grp=document.createElement('div');
    grp.className='chapter-group';
    const hdr=document.createElement('div');
    hdr.className='chap-hdr';
    hdr.innerHTML=`<span class="chap-chevron">▼</span>${ch.label}`;
    hdr.onclick=()=>{
      hdr.classList.toggle('collapsed');
      grp.querySelector('.chap-sessions').classList.toggle('hidden');
    };
    const sd=document.createElement('div');
    sd.className='chap-sessions';
    ch.sessions.forEach(n=>{
      const s=byId(n); if(!s)return;
      const btn=document.createElement('div');
      btn.className='sess-btn'+(done.includes(n)?' done':'');
      btn.id=`sb-${n}`;
      const lbl=(s.topics_covered&&s.topics_covered.length>0)
        ? s.topics_covered[0]
        : s.book_chapter;
      btn.innerHTML=`<span class="num">${n}</span><span class="lbl">${lbl}</span><span class="dt">${s.date.slice(5)}</span>`;
      btn.onclick=()=>loadSession(n);
      sd.appendChild(btn);
    });
    grp.appendChild(hdr);
    grp.appendChild(sd);
    nav.appendChild(grp);
  });
}

function loadSession(num){
  document.querySelectorAll('.sess-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(`sb-${num}`);
  if(btn) btn.classList.add('active');

  curSession=byId(num);
  curTab=0;

  document.getElementById('topbar').style.display='flex';
  document.getElementById('tabs').style.display='flex';
  document.getElementById('welcome').style.display='none';
  document.getElementById('session-view').style.display='flex';
  document.getElementById('search-view').style.display='none';
  document.getElementById('search-input').value='';

  const s=curSession;
  document.getElementById('tb-chapter').textContent=s.book_chapter;
  document.getElementById('tb-name').textContent=`${num}회차 트레이닝`;
  document.getElementById('tb-date').textContent=`📅 ${s.date}`;

  const doneBtn=document.getElementById('done-btn');
  doneBtn.classList.toggle('marked',done.includes(num));
  doneBtn.textContent=done.includes(num)?'✓ 학습 완료됨':'✓ 학습 완료';

  document.getElementById('b0').textContent=(s.teacher_explanations||[]).length;
  document.getElementById('b1').textContent=(s.examples_analogies||[]).length;
  document.getElementById('b2').textContent=(s.training_questions||[]).length;
  document.getElementById('b3').textContent=(s.key_concepts||[]).length;

  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===0));

  buildPanels(s);
}

function buildPanels(s){
  // Panel 0: 선생님 설명
  const p0=document.getElementById('p0');
  p0.innerHTML='';
  const topics=s.topics_covered||[];
  if(topics.length){
    const bar=document.createElement('div');
    bar.className='topics-bar';
    bar.innerHTML='<span class="topics-lbl">이번 세션 주제</span>'+topics.map(t=>`<span class="topic-chip">${t}</span>`).join('');
    p0.appendChild(bar);
  }
  (s.teacher_explanations||[]).forEach(exp=>{
    const topic = typeof exp==='object' ? (exp.topic||'') : '';
    const explanation = typeof exp==='object' ? (exp.explanation||exp.text||'') : String(exp);
    if(!explanation) return;
    const card=document.createElement('div');
    card.className='explain-card';
    card.innerHTML=`${topic?`<div class="card-topic">${topic}</div>`:''}<div class="card-text">${explanation.replace(/\n/g,'<br>')}</div>`;
    p0.appendChild(card);
  });
  if(!p0.children.length) p0.innerHTML='<div class="no-results">설명 내용이 없습니다.</div>';

  // Panel 1: 예시·비유
  const p1=document.getElementById('p1');
  p1.innerHTML='';
  const icons=['💡','🔦','🌿','⚡','🎯','🔑','🌊','🏔️','🌱'];
  (s.examples_analogies||[]).forEach((ex,i)=>{
    const ctx = typeof ex==='object' ? (ex.context||'') : '';
    const content = typeof ex==='object' ? (ex.content||ex.text||'') : String(ex);
    if(!content) return;
    const card=document.createElement('div');
    card.className='example-card';
    card.innerHTML=`<div class="ex-icon">${icons[i%icons.length]}</div>
      <div><div class="ctx-lbl">${ctx||'예시·비유'}</div><div class="ex-text">${content.replace(/\n/g,'<br>')}</div></div>`;
    p1.appendChild(card);
  });
  if(!p1.children.length) p1.innerHTML='<div class="no-results">예시·비유 내용이 없습니다.</div>';

  // Panel 2: 트레이닝 질문
  const p2=document.getElementById('p2');
  p2.innerHTML='';
  const tip=document.createElement('div');
  tip.className='q-tip';
  tip.innerHTML='💬 <strong>트레이닝 팁:</strong> 나연 약사가 책을 읽은 후, 아래 질문들을 순서대로 던져보세요. 바로 답하기 어렵다면 "함께 생각해볼까요?"로 이어가면 됩니다.';
  p2.appendChild(tip);
  (s.training_questions||[]).forEach((q,i)=>{
    const text=typeof q==='string'?q:(q.question||q.text||JSON.stringify(q));
    const card=document.createElement('div');
    card.className='question-card';
    card.innerHTML=`<div class="q-header"><div class="q-num">Q${i+1}</div><div class="q-text">${text}</div></div>`;
    p2.appendChild(card);
  });
  if(p2.children.length<=1) p2.innerHTML='<div class="no-results">질문 내용이 없습니다.</div>';

  // Panel 3: 핵심 개념
  const p3=document.getElementById('p3');
  p3.innerHTML='';
  const grid=document.createElement('div');
  grid.className='concepts-grid';
  (s.key_concepts||[]).forEach(c=>{
    const chip=document.createElement('div');
    chip.className='concept-chip';
    chip.textContent=typeof c==='string'?c:JSON.stringify(c);
    grid.appendChild(chip);
  });
  if(grid.children.length) p3.appendChild(grid);
  else p3.innerHTML='<div class="no-results">핵심 개념이 없습니다.</div>';
}

function switchTab(i){
  curTab=i;
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.querySelectorAll('.tab-panel').forEach((p,j)=>p.classList.toggle('active',j===i));
}

function toggleDone(){
  if(!curSession) return;
  const num=curSession.session_num;
  done=done.includes(num)?done.filter(d=>d!==num):[...done,num];
  localStorage.setItem('enn_done',JSON.stringify(done));
  updateProgress();
  buildNav();
  const doneBtn=document.getElementById('done-btn');
  doneBtn.classList.toggle('marked',done.includes(num));
  doneBtn.textContent=done.includes(num)?'✓ 학습 완료됨':'✓ 학습 완료';
}

function updateProgress(){
  const cnt=done.length,total=SESSIONS.length;
  document.getElementById('prog-lbl').textContent=`진행률: ${cnt} / ${total} 세션`;
  document.getElementById('prog-fill').style.width=`${(cnt/total)*100}%`;
}

// Search
function handleSearch(val){
  const sv=document.getElementById('search-view');
  const ssv=document.getElementById('session-view');
  const wv=document.getElementById('welcome');
  if(!val.trim()){
    sv.style.display='none';
    if(curSession){ ssv.style.display='flex'; wv.style.display='none'; document.getElementById('topbar').style.display='flex'; document.getElementById('tabs').style.display='flex'; }
    else { ssv.style.display='none'; wv.style.display='flex'; document.getElementById('topbar').style.display='none'; document.getElementById('tabs').style.display='none'; }
    return;
  }
  ssv.style.display='none'; wv.style.display='none';
  document.getElementById('topbar').style.display='none';
  document.getElementById('tabs').style.display='none';
  sv.style.display='block';

  const q=val.toLowerCase();
  const results=[];
  SESSIONS.forEach(s=>{
    const hits=[];
    (s.teacher_explanations||[]).forEach(e=>{
      const topic=typeof e==='object'?(e.topic||''):'';
      const text=typeof e==='object'?(e.explanation||e.text||''):String(e);
      if(topic.toLowerCase().includes(q)||text.toLowerCase().includes(q))
        hits.push({type:'📖 선생님 설명',topic,text});
    });
    (s.examples_analogies||[]).forEach(e=>{
      const ctx=typeof e==='object'?(e.context||''):'';
      const text=typeof e==='object'?(e.content||e.text||''):String(e);
      if(ctx.toLowerCase().includes(q)||text.toLowerCase().includes(q))
        hits.push({type:'💡 예시·비유',topic:ctx,text});
    });
    (s.training_questions||[]).forEach(qq=>{
      const text=typeof qq==='string'?qq:(qq.question||'');
      if(text.toLowerCase().includes(q)) hits.push({type:'❓ 트레이닝 질문',topic:'',text});
    });
    (s.key_concepts||[]).forEach(c=>{
      const text=typeof c==='string'?c:'';
      if(text.toLowerCase().includes(q)) hits.push({type:'🏷️ 핵심 개념',topic:'',text});
    });
    if(hits.length) results.push({s,hits});
  });

  if(!results.length){ sv.innerHTML=`<div class="no-results" style="padding:60px;">🔍 "<strong>${val}</strong>" 검색 결과가 없습니다.</div>`; return; }

  sv.innerHTML=results.map(r=>`
    <div class="sr-card">
      <div class="sr-header" onclick="loadSession(${r.s.session_num});document.getElementById('search-input').value='';">
        <div class="sr-snum">${r.s.session_num}</div>
        <div class="sr-title">${r.s.session_num}회차 — ${r.s.book_chapter}</div>
        <div class="sr-date">${r.s.date}</div>
        <div class="sr-link">열기 →</div>
      </div>
      ${r.hits.slice(0,4).map(h=>`
        <div class="sr-hit">
          <div class="sr-hit-type">${h.type}${h.topic?' · '+h.topic:''}</div>
          <div class="sr-hit-text">${hl(h.text.slice(0,180)+(h.text.length>180?'…':''),val)}</div>
        </div>`).join('')}
      ${r.hits.length>4?`<div style="font-size:12px;color:var(--muted);margin-top:4px;padding:0 4px;">외 ${r.hits.length-4}개 항목</div>`:''}
    </div>`).join('');
}

function hl(text,q){
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),
    '<mark style="background:#FFE082;border-radius:2px;padding:0 2px;">$1</mark>');
}

buildNav();
updateProgress();
</script>
</body>
</html>
